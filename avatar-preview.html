<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마웨그 3D 아바타 검수</title><link rel="stylesheet" href="css/avatar-v2.css"><style>html,body{margin:0;height:100%;background:#080d15}.preview{height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,#183044 0,#0b1420 38%,#05080d 75%)}.avatar-v2{width:min(70vw,620px)!important;height:min(92vh,820px)!important}</style></head><body><main class="preview" id="preview"></main><script type="module">import{renderAvatarV2,playAvatarV2}from'./js/avatar-v2.js';const q=new URLSearchParams(location.search),avatar={body:q.get('body')||'basic',face:q.get('face')||'default',hair:q.get('hair')||'default',headgear:q.get('headgear'),top:q.get('top')||'white-tee',bottom:q.get('bottom')||'black-track',shoes:q.get('shoes'),rightHand:q.get('rightHand'),leftHand:q.get('leftHand'),pose:q.get('pose')||'neutral',effect:q.get('effect'),animation:q.get('animation')||'idle'};preview.innerHTML=renderAvatarV2(avatar,{size:620,label:'마웨그 아바타'});preview.onclick=()=>playAvatarV2(preview.querySelector('.avatar-v2'));</script></body></html>
