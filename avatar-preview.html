<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마웨그 3D 아바타 검수</title><link rel="stylesheet" href="css/avatar-v2.css"><style>html,body{margin:0;height:100%;background:#080d15}.preview{height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,#183044 0,#0b1420 38%,#05080d 75%)}.avatar-v2{width:min(70vw,620px)!important;height:min(92vh,820px)!important}</style></head><body><main class="preview" id="preview"></main><script type="module">import{renderAvatarV2,playAvatarV2}from'./js/avatar-v2.js';const avatar={body:'basic',face:'default',hair:'default',headgear:null,top:'white-tee',bottom:'black-track',shoes:null,rightHand:null,leftHand:null,pose:'neutral',effect:null,animation:'idle'};preview.innerHTML=renderAvatarV2(avatar,{size:620,label:'마웨그 기본형'});preview.onclick=()=>playAvatarV2(preview.querySelector('.avatar-v2'));</script></body></html>
