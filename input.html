<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>데이터 입력 | 마웨그</title>
  <meta property="og:title" content="데이터 입력 | 마웨그">
  <meta property="og:description" content="오늘의 체중과 식단·운동을 기록하세요.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/borders.css">
  <style>
    /* 신호등 */
    .tl-group { display:flex; gap:6px; align-items:center; }
    .tl-btn {
      width:22px; height:22px; border-radius:50%; border:none; cursor:pointer;
      opacity:.2; transition:opacity .15s, transform .1s; flex-shrink:0;
    }
    .tl-btn:hover { opacity:.5; }
    .tl-btn.on { opacity:1; transform:scale(1.15); }
    .tl-btn.red-tl    { background:var(--red); }
    .tl-btn.yellow-tl { background:var(--orange); }
    .tl-btn.green-tl  { background:var(--green); }

    /* 운동 버튼 */
    .ex-btn {
      width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border);
      font-size:16px; cursor:pointer; background:transparent; color:var(--muted);
      opacity:.35; transition:all .15s; display:flex; align-items:center; justify-content:center;
    }
    .ex-btn:hover { opacity:.65; }
    .ex-btn.on-check { opacity:1; border-color:var(--green); color:var(--green); background:rgba(102,187,106,.1); }
    .ex-btn.on-cross { opacity:1; border-color:var(--red);   color:var(--red);   background:rgba(239,83,80,.1); }

    /* 식단/운동 섹션 (모바일) */
    .dc-extra { margin-top:12px; padding-top:12px; border-top:1px solid var(--border); display:flex; gap:16px; flex-wrap:wrap; }
    .dc-meal-col { display:flex; flex-direction:column; gap:6px; flex:1; min-width:160px; }
    .dc-meal-row { display:flex; align-items:center; gap:8px; }
    .dc-meal-label { font-size:11px; color:var(--muted); width:28px; flex-shrink:0; }
    .dc-ex-col { display:flex; flex-direction:column; gap:6px; justify-content:center; }
    .dc-ex-label { font-size:11px; color:var(--muted); }
    .dc-ex-row { display:flex; gap:6px; }

    /* 모두 입력 완료 */
    .day-card.all-done { border-color: var(--green) !important; background: rgba(102,187,106,.05) !important; }

    /* 데스크탑: 한 줄 컴팩트 레이아웃 */
    @media(min-width:768px) {
      /* 카드를 내용 크기에 맞게 + 가운데 정렬 */
      .day-card { display:inline-flex; flex-direction:row; align-items:center; flex-wrap:nowrap;
                  gap:18px; padding:14px 24px; margin-bottom:10px; width:auto !important; }
      #content { display:flex; flex-direction:column; align-items:center; }
      .day-card .dc-top { margin-bottom:0; flex-shrink:0; min-width:180px; }
      .day-card .dc-name { font-size:18px; }
      .day-card .dc-date { font-size:14px; }
      .day-card .dc-row { flex-shrink:0; margin:0; gap:10px; }
      .day-card .dc-input { font-size:20px; padding:10px 14px; max-width:120px; }
      .day-card .dc-btn { padding:10px 20px; font-size:16px; }
      .day-card .dc-status { display:none; }
      .dc-extra { flex-shrink:0; margin-top:0 !important; padding-top:0 !important; border-top:none !important; flex-wrap:nowrap !important; gap:14px !important; align-items:center !important; }
      .dc-meal-col { flex-direction:column !important; align-items:flex-start !important; gap:10px !important; flex-shrink:0; min-width:auto !important; }
      .dc-meal-row { flex-wrap:nowrap; gap:10px !important; }
      .dc-meal-label { width:auto !important; font-size:14px !important; flex-shrink:0; min-width:40px; }
      .dc-ex-col { flex-direction:column !important; align-items:center !important; gap:6px !important; flex-shrink:0; }
      .dc-ex-label { font-size:14px !important; }
      .dc-ex-row { gap:8px !important; }
      .tl-btn { width:28px; height:28px; }
      .ex-btn { width:38px; height:38px; font-size:18px; border-radius:8px; }
    }
  </style>
</head>
<body>

<header class="top-bar" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px">
  <div></div>
  <a href="index.html?select=1" class="mweg-header-wrap" style="justify-self:center"><span class="mweg-title">마웨그</span><span class="mweg-subtitle">My Weight Graph</span></a>
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <div class="user-chip" onclick="openProfileEdit()" id="userChip">
      <div id="chipAvatarWrap" class="avatar-frame chip-avatar">
        <div class="chip-avatar-inner"><span id="chipEmoji">⚖️</span></div>
      </div>
      <div class="chip-info">
        <span id="chipTitle" class="chip-title"></span>
        <span id="chipName" class="chip-name">-</span>
        <span id="chipScore" class="chip-score"></span>
      </div>
      <span style="font-size:10px;color:var(--muted)">✏️</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="page">
  <div id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>

<!-- 프로필 수정 모달 -->
<div class="modal-bg" id="profileModal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <h3>✏️ 프로필 수정</h3>
    <div class="input-group">
      <label class="input-label">이모지</label>
      <div id="pEmojiGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px"></div>
      <input class="input-field" id="pCustomEmoji" placeholder="직접 입력 (예: 🦁)" maxlength="4">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="input-group"><label class="input-label">키 (cm) *</label>
        <input class="input-field" id="pHeight" type="number" placeholder="175" min="100" max="250"></div>
      <div class="input-group"><label class="input-label">출생연도 *</label>
        <input class="input-field" id="pBirthYear" type="number" placeholder="1990" min="1930" max="2010"></div>
    </div>
    <div class="input-group mt-8" id="pTitleGroup" style="display:none">
      <label class="input-label">칭호</label><div id="pTitleSection"></div>
    </div>
    <div class="input-group mt-8">
      <label class="input-label" id="pPwLabel">비밀번호 변경</label>
      <div id="pPwSection"></div>
    </div>
    <div class="flex-row gap-8 mt-12">
      <button class="btn btn-ghost btn-full" onclick="closeProfileEdit()">취소</button>
      <button class="btn btn-primary btn-full" onclick="saveProfileEdit()">저장</button>
    </div>
  </div>
</div>


<div class="toast" id="toast"></div>

<script type="module">
import { getUser, getWeights, setWeight, deleteWeight, parseWeight, toDateStr, updateUser, setUserPassword, setDietExercise, getTierSettings } from './js/db.js';
import { getTierForScore, DEFAULT_TIERS } from './js/achievements.js';
import { clearAuth, saveAuth } from './js/auth.js';
const uid = new URLSearchParams(location.search).get('user') || localStorage.getItem('uid');
if (!uid) location.href='index.html';
window.doLogout = () => { clearAuth(); localStorage.removeItem('uid'); location.href='index.html'; };

const EMOJIS=['⚖️','💪','🔥','👑','🏃','🌟','🎯','😤','🦁','🐯','🐻','🐺','🦊','🐸','🐼','🦋','🍎','🥗','🥑','🎽','🏋️','🚴','🧘','💎','🌈','⚡','🎖️','🏆','🌙','☀️','💫','✨'];
let selEmoji='';
const DAY_KO=['일','월','화','수','목','금','토'];
let existingMap={}, allRecords=[], user=null;

function setChipData(u, tierColor) {
  const tc = tierColor || '#00e5aa';
  document.getElementById('chipEmoji').textContent = u?.emoji || '⚖️';
  document.getElementById('chipName').textContent  = u?.name || '-';
  document.getElementById('chipName').style.color  = tc;
  const wrap = document.getElementById('chipAvatarWrap');
  if (wrap) { wrap.className = `avatar-frame chip-avatar${u?.selectedBorder?' border-'+u.selectedBorder:''}`; wrap.style.setProperty('--tier-color', tc); }
  const titleEl = document.getElementById('chipTitle');
  if (titleEl) { titleEl.textContent = u?.selectedTitle||''; titleEl.style.color = tc; titleEl.style.display = u?.selectedTitle?'':'none'; }
  const scoreEl = document.getElementById('chipScore');
  if (scoreEl) scoreEl.textContent = ((u?.totalScore||0)>0)?`${u.totalScore} PT`:'';
}

function buildNav() {
  const links=[
    {href:`input.html?user=${uid}`,        icon:'✏️',  label:'데이터 입력', id:'input'},
    {href:`dashboard.html?user=${uid}`,    icon:'📊', label:'그래프',      id:'dashboard'},
    {href:`achievements.html?user=${uid}`, icon:'🏆', label:'업적',        id:'achievements'},
  ];
  const nav=document.getElementById('bottomNav');
  links.forEach(l=>{
    const a=document.createElement('a');
    a.href=l.href; a.className=l.id==='input'?'active':'';
    a.innerHTML=`<span class="icon">${l.icon}</span>${l.label}`;
    nav.appendChild(a);
  });
}

function fmtDate(d){
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ── 데이터 입력 카드 ─────────────────────────────────────────────────
window.onDayInput = dateStr => {
  const inp=document.getElementById(`inp-${dateStr}`);
  const st=document.getElementById(`dcst-${dateStr}`);
  if(!inp)return;
  const raw=inp.value.trim();
  const hasSaved=existingMap[dateStr]!=null;
  if(raw===''||raw==='-'){
    inp.style.borderColor=hasSaved?'var(--green)':'var(--border)';
    if(st){st.textContent=hasSaved?'✓ 저장됨':'';st.style.color=hasSaved?'var(--green)':'var(--muted)';}
  } else {
    // 입력 중이면 빨간 (아직 미저장)
    inp.style.borderColor='var(--red)';
    if(st){st.textContent='저장 버튼을 눌러주세요';st.style.color='var(--red)';}
  }
};

window.submitDay = async dateStr => {
  const inp=document.getElementById(`inp-${dateStr}`);
  const st=document.getElementById(`dcst-${dateStr}`);
  const raw=inp.value.trim();

  if(raw===''||raw==='-'){
    await setWeight(uid,dateStr,null);
    existingMap[dateStr]=null;
    inp.style.borderColor='var(--border)';
    if(st){st.textContent='';st.style.color='var(--muted)';}
    showToast('기록이 삭제됐어요','ok');
    return;
  }

  const w=parseWeight(raw);
  if(w===null){showToast('숫자를 입력해주세요','err');return;}

  const err=validateWeight(dateStr,w);
  if(err){showWeightError(err,()=>{const prev=existingMap[dateStr];inp.value=prev!=null?prev.toFixed(1):'';onDayInput(dateStr);});return;}

  inp.value=w.toFixed(1);
  await setWeight(uid,dateStr,w);
  existingMap[dateStr]=w;
  inp.style.borderColor='var(--green)';
  if(st){st.textContent='✓ 저장됨';st.style.color='var(--green)';}
  showToast('저장됐어요 ✓','ok');
  refreshCardState(dateStr);
};

// ── all-done 체크 ─────────────────────────────────────────────────────
function refreshCardState(dateStr) {
  const rec = allRecords.find(r=>r.date===dateStr);
  const weight = existingMap[dateStr];
  const meal = rec?.meal || {};
  const exercise = rec?.exercise;
  const allDone = weight != null
    && meal.morning != null && meal.lunch != null && meal.dinner != null
    && (exercise === true || exercise === false);
  const card = document.getElementById(`daycard-${dateStr}`);
  if (card) card.classList.toggle('all-done', allDone);
}

// ── 식단 저장 ─────────────────────────────────────────────────────────
window.setMeal = async (dateStr, mealTime, value) => {
  const rec = allRecords.find(r=>r.date===dateStr);
  const currentMeal = rec?.meal || {};
  const newVal = currentMeal[mealTime] === value ? null : value;
  const newMeal = { ...currentMeal, [mealTime]: newVal };
  await setDietExercise(uid, dateStr, { meal: newMeal });
  if(rec) rec.meal=newMeal;
  else allRecords.push({ date:dateStr, meal:newMeal });
  ['red','yellow','green'].forEach(c=>{
    const btn=document.querySelector(`#daycard-${dateStr} .tl-btn.${c}-tl[onclick*="${mealTime}"]`);
    if(btn) btn.classList.toggle('on', newMeal[mealTime]===(c==='yellow'?'yellow':c));
  });
  refreshCardState(dateStr);
};

// ── 운동 저장 ─────────────────────────────────────────────────────────
window.setExercise = async (dateStr, value) => {
  const rec = allRecords.find(r=>r.date===dateStr);
  const current = rec?.exercise;
  const newVal = current === value ? null : value;
  await setDietExercise(uid, dateStr, { exercise: newVal });
  if(rec) rec.exercise=newVal;
  else allRecords.push({ date:dateStr, exercise:newVal });
  document.querySelectorAll(`#daycard-${dateStr} .ex-btn`).forEach((btn,i)=>{
    btn.className='ex-btn';
    if(newVal===true  && i===0) btn.className='ex-btn on-check';
    if(newVal===false && i===1) btn.className='ex-btn on-cross';
  });
  refreshCardState(dateStr);
};


async function render() {
  buildNav();
  const [_iu, _ir, _itd] = await Promise.all([getUser(uid), getWeights(uid), getTierSettings().catch(()=>null)]);
  user = _iu; allRecords = _ir;
  existingMap = Object.fromEntries(allRecords.map(r=>[r.date, r.weight]));
  const _iTiers = _itd?.tiers || DEFAULT_TIERS;
  const _iTier  = getTierForScore(user?.totalScore || 0, _iTiers);
  setChipData(user, _iTier.color);

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = toDateStr(today);
  const labels=['오늘','어제','2일 전','3일 전','4일 전','5일 전'];
  let cards='';
  for(let i=0;i<=5;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const dateStr=toDateStr(d);
    const rec=allRecords.find(r=>r.date===dateStr);
    const val=rec?.weight;
    const meal=rec?.meal||{};
    const exercise=rec?.exercise;
    const hasSaved=val!=null;
    const isToday=(i===0);

    // 모두 입력 완료 여부
    const allDone = hasSaved
      && meal.morning != null && meal.lunch != null && meal.dinner != null
      && (exercise === true || exercise === false);

    const extraSection = `
      <div class="dc-extra">
        <div class="dc-meal-col">
          ${['morning','lunch','dinner'].map((m,mi)=>`
            <div class="dc-meal-row">
              <span class="dc-meal-label">${['아침','점심','저녁'][mi]}</span>
              <div class="tl-group">
                <button class="tl-btn red-tl ${meal[m]==='red'?'on':''}"    onclick="setMeal('${dateStr}','${m}','red')"></button>
                <button class="tl-btn yellow-tl ${meal[m]==='yellow'?'on':''}" onclick="setMeal('${dateStr}','${m}','yellow')"></button>
                <button class="tl-btn green-tl ${meal[m]==='green'?'on':''}"  onclick="setMeal('${dateStr}','${m}','green')"></button>
              </div>
            </div>`).join('')}
        </div>
        <div class="dc-ex-col">
          <span class="dc-ex-label">운동</span>
          <div class="dc-ex-row">
            <button class="ex-btn ${exercise===true?'on-check':''}"  onclick="setExercise('${dateStr}',true)">✓</button>
            <button class="ex-btn ${exercise===false?'on-cross':''}" onclick="setExercise('${dateStr}',false)">✗</button>
          </div>
        </div>
      </div>`;

    cards+=`
      <div class="day-card${allDone?' all-done':''}" id="daycard-${dateStr}">
        <div class="dc-top">
          <span class="dc-name" style="${isToday?'color:var(--teal)':''}">${labels[i]}</span>
          <span class="dc-date">${fmtDate(d)} (${DAY_KO[d.getDay()]})</span>
        </div>
        <div class="dc-row">
          <input type="number" step="0.1" class="dc-input" id="inp-${dateStr}"
            placeholder="--.-"
            value="${hasSaved?val.toFixed(1):''}"
            style="border-color:${hasSaved?'var(--green)':'var(--border)'}"
            oninput="onDayInput('${dateStr}')">
          <span class="dc-unit">kg</span>
          <button class="dc-btn" onclick="submitDay('${dateStr}')">저장</button>
        </div>
        <div class="dc-status" id="dcst-${dateStr}" style="color:${hasSaved?'var(--green)':'var(--muted)'}">${hasSaved?'✓ 저장됨':''}</div>
        ${extraSection}
      </div>`;
  }

  document.getElementById('content').innerHTML=cards;
}


// ── 체중 유효성 검사 ─────────────────────────────────────────────────
function validateWeight(dateStr, newW) {
  // 인접 기록 찾기
  const sorted = Object.entries(existingMap)
    .filter(([d,w]) => d !== dateStr && w != null)
    .sort((a,b) => a[0].localeCompare(b[0]));
  if (!sorted.length) return null; // 비교 대상 없으면 통과

  const targetTime = new Date(dateStr).getTime();
  let nearest = null, nearestDays = Infinity;
  sorted.forEach(([d,w]) => {
    const days = Math.abs((new Date(d).getTime() - targetTime) / 86400000);
    if (days < nearestDays) { nearestDays = days; nearest = { d, w, days }; }
  });
  if (!nearest) return null;

  const maxAllowed = Math.min(Math.max(nearest.days, 1) * 3, 20);
  const diff = Math.abs(newW - nearest.w);
  if (diff > maxAllowed) {
    return `전후 기록(${nearest.w.toFixed(1)}kg)과 ${diff.toFixed(1)}kg 차이입니다. 정상적인 수치를 입력해주세요. 이게 맞다면 관리자에게 문의하세요.`;
  }
  return null;
}

function showWeightError(msg, onDismiss) {
  // 에러 모달
  let el = document.getElementById('weightErrModal');
  if (!el) {
    document.body.insertAdjacentHTML('beforeend',`
      <div id="weightErrModal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:600;opacity:0;pointer-events:none;transition:opacity .2s">
        <div style="background:var(--surface);border:1px solid var(--red);border-radius:12px;padding:20px;max-width:88vw;width:320px;text-align:center" onclick="event.stopPropagation()">
          <div style="font-size:24px;margin-bottom:10px">⚠️</div>
          <div id="weightErrMsg" style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:16px"></div>
          <button class="btn btn-ghost btn-sm btn-full" onclick="closeWeightErr()">확인</button>
        </div>
      </div>`);
    el = document.getElementById('weightErrModal');
    el.addEventListener('click', () => closeWeightErr());
  }
  document.getElementById('weightErrMsg').textContent = msg;
  el.style.opacity='1'; el.style.pointerEvents='all';
  window._weightErrCb = onDismiss;
}
window.closeWeightErr = () => {
  const el = document.getElementById('weightErrModal');
  if (el) { el.style.opacity='0'; el.style.pointerEvents='none'; }
  if (window._weightErrCb) { window._weightErrCb(); window._weightErrCb=null; }
};



function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',2000);
}

// ── 프로필 수정 ──────────────────────────────────────────────────────
window.openProfileEdit = () => {
  selEmoji = user?.emoji || '⚖️';
  document.getElementById('pEmojiGrid').innerHTML = EMOJIS.map(e =>
    `<button style="font-size:22px;padding:4px;border-radius:7px;cursor:pointer;background:${e===selEmoji?'rgba(0,229,170,.15)':'transparent'};border:2px solid ${e===selEmoji?'var(--teal)':'transparent'}" onclick="pickPEmoji('${e}')">${e}</button>`
  ).join('');
  document.getElementById('pCustomEmoji').value  = '';
  document.getElementById('pHeight').value       = user?.height    || '';
  document.getElementById('pBirthYear').value    = user?.birthYear || '';
  const titles = user?.earnedTitles || [];
  const tg = document.getElementById('pTitleGroup');
  if(titles.length){ tg.style.display=''; document.getElementById('pTitleSection').innerHTML=`<select class="input-field" id="pTitleSelect"><option value="">칭호 없음</option>${titles.map(t=>`<option value="${t}" ${t===user?.selectedTitle?'selected':''}>${t}</option>`).join('')}</select>`; }
  else tg.style.display='none';
  const hasPw=!!user?.passwordHash;
  document.getElementById('pPwLabel').textContent=hasPw?'비밀번호 변경':'비밀번호 설정 (선택)';
  document.getElementById('pPwSection').innerHTML=`<input class="input-field" id="pNewPw" type="password" inputmode="numeric" maxlength="4" placeholder="${hasPw?'새 비밀번호 4자리':'비워두면 공개'}" style="margin-bottom:8px"><input class="input-field" id="pNewPwC" type="password" inputmode="numeric" maxlength="4" placeholder="확인">`;
  document.getElementById('profileModal').classList.add('open');
};
window.closeProfileEdit = () => document.getElementById('profileModal').classList.remove('open');
document.getElementById('profileModal').addEventListener('click',e=>{if(e.target===document.getElementById('profileModal'))closeProfileEdit();});
window.pickPEmoji = e => {
  selEmoji=e; document.getElementById('pCustomEmoji').value='';
  document.querySelectorAll('#pEmojiGrid button').forEach(b=>{
    const s=b.textContent===e; b.style.background=s?'rgba(0,229,170,.15)':'transparent'; b.style.border=`2px solid ${s?'var(--teal)':'transparent'}`;
  });
};
window.saveProfileEdit = async () => {
  const custom=document.getElementById('pCustomEmoji').value.trim();
  const emoji=custom||selEmoji;
  const height=parseInt(document.getElementById('pHeight').value)||null;
  const birthYear=parseInt(document.getElementById('pBirthYear').value)||null;
  if(!height){showToast('키를 입력해주세요','err');return;}
  if(!birthYear){showToast('출생연도를 입력해주세요','err');return;}
  const pw=document.getElementById('pNewPw')?.value||'';
  const pwC=document.getElementById('pNewPwC')?.value||'';
  if(pw&&pw!==pwC){showToast('비밀번호가 일치하지 않아요','err');return;}
  if(pw&&!/^\d{4}$/.test(pw)){showToast('숫자 4자리로 입력해주세요','err');return;}
  const selectedTitle=document.getElementById('pTitleSelect')?.value||user?.selectedTitle||null;
  await updateUser(uid,{emoji,height,birthYear,selectedTitle});
  user={...user,emoji,height,birthYear,selectedTitle};
  setChipData(user, document.getElementById('chipName')?.style.color||'#00e5aa');
  if(pw){const h=await setUserPassword(uid,pw);saveAuth(uid,h);user.passwordHash=h;}
  closeProfileEdit();showToast('프로필 변경됨 ✓');
};


render().catch(console.error);
</script>
<script src="register-sw.js"></script>
