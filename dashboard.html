<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>그래프 | 마웨그</title>
  <meta property="og:title" content="그래프 | 마웨그">
  <meta property="og:description" content="나만의 체중 변화 그래프 — 기록하고, 분석하고, 목표를 이루세요.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/borders.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    #barWrap{position:relative;height:110px;width:100%;margin-top:1px;}
    #barWrap canvas{background:#0d1117;border-radius:0 0 10px 10px;}
    #mainC{border-radius:10px 10px 0 0;background:#0d1117;display:block;}
    @media(min-width:768px){ .page { max-width: min(1200px, 96vw) !important; } }
    .opt-panel{
      display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px;
      padding:8px 12px;background:rgba(255,255,255,.03);
      border:1px solid var(--border);border-radius:8px;margin-top:8px;
    }
    .opt-item{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--muted);white-space:nowrap;}
    .opt-item input[type=checkbox]{accent-color:var(--teal);width:13px;height:13px;cursor:pointer;}
    .opt-item:hover{color:var(--text);}
    .opt-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
    .opt-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;white-space:nowrap;}
  </style>
</head>
<body>
<header class="top-bar" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px">
  <!-- 좌: 오늘 결여 알림 -->
  <div id="todayAlert" style="min-width:0"></div>
  <!-- 중앙: 마웨그 -->
  <a href="index.html?select=1" class="mweg-header-wrap" style="justify-self:center"><span class="mweg-title">마웨그</span><span class="mweg-subtitle">My Weight Graph</span></a>
  <!-- 우: 유저칩 + 로그아웃 -->
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <div class="user-chip" onclick="openProfileEdit()" id="userChip">
      <div id="chipAvatarWrap" class="avatar-frame chip-avatar">
        <div class="chip-avatar-inner"><span id="chipEmoji">⚖️</span></div>
      </div>
      <div class="chip-info">
        <span id="chipTitle" class="chip-title"></span>
        <span id="chipName" class="chip-name">-</span>
        <span id="chipScore" class="chip-score"></span>
      </div>
      <span id="chipEdit" style="font-size:10px;color:var(--muted)"></span>
    </div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- 프로필 수정 모달 -->
<div class="modal-bg" id="profileModal">
  <div class="modal" style="max-height:90vh;overflow-y:auto">
    <h3>✏️ 프로필 수정</h3>

    <!-- 이모지 -->
    <div class="input-group">
      <label class="input-label">이모지</label>
      <div id="profileEmojiGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px"></div>
      <input class="input-field" id="profileCustomEmoji" placeholder="직접 입력 (예: 🦁)" maxlength="4">
    </div>

    <!-- 키 / 생년월일 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="input-group">
        <label class="input-label">키 (cm) *</label>
        <input class="input-field" id="profileHeight" type="number" placeholder="175" min="100" max="250">
      </div>
      <div class="input-group">
        <label class="input-label">출생연도 *</label>
        <input class="input-field" id="profileBirthYear" type="number" placeholder="1990" min="1930" max="2010">
      </div>
    </div>

    <!-- 테두리 -->
    <div class="input-group mt-12">
      <label class="input-label">테두리</label>
      <div id="profileBorderSection" style="font-size:12px;color:var(--muted);padding:8px 0">업적 달성 시 잠금해제돼요</div>
    </div>

    <!-- 칭호 -->
    <div class="input-group mt-8" id="profileTitleGroup" style="display:none">
      <label class="input-label">칭호</label>
      <div id="profileTitleSection"></div>
    </div>

    <!-- 비밀번호 -->
    <div class="input-group mt-12">
      <label class="input-label" id="profilePwLabel">비밀번호</label>
      <div id="profilePwSection"></div>
    </div>

    <div class="flex-row gap-8 mt-12">
      <button class="btn btn-ghost btn-full" onclick="closeProfileEdit()">취소</button>
      <button class="btn btn-primary btn-full" onclick="saveProfileEdit()">저장</button>
    </div>
  </div>
</div>

<div class="page">
  <div id="content">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<script type="module">
import { getUser, getWeights, getSettings, updateSettings, toDateStr, updateUser, setUserPassword, getTierSettings } from './js/db.js';
import { isAuthed, clearAuth, saveAuth } from './js/auth.js';
import { renderChart, calcStats } from './js/chart-render.js';
import { getTierForScore, DEFAULT_TIERS } from './js/achievements.js';

const uid = new URLSearchParams(location.search).get('user') || localStorage.getItem('uid');
const isAdminView = new URLSearchParams(location.search).get('admin_view') === '1';
if (!uid) location.href='index.html';

window.doLogout = () => { clearAuth(); localStorage.removeItem('uid'); location.href='index.html'; };

function buildNav(uid) {
  const links=[
    {href:`input.html?user=${uid}`,        icon:'✏️',  label:'데이터 입력', id:'input'},
    {href:`dashboard.html?user=${uid}`,    icon:'📊', label:'그래프',      id:'dashboard'},
    {href:`achievements.html?user=${uid}`, icon:'🏆', label:'업적',        id:'achievements'},
  ];
  const nav=document.getElementById('bottomNav');
  links.forEach(l=>{
    const a=document.createElement('a');
    a.href=l.href; a.className=l.id==='dashboard'?'active':'';
    a.innerHTML=`<span class="icon">${l.icon}</span>${l.label}`;
    nav.appendChild(a);
  });
}

let S={}, user=null, records=[];

async function render() {
  buildNav(uid);
  const [_u, _r, _s, _td] = await Promise.all([getUser(uid), getWeights(uid), getSettings(), getTierSettings().catch(()=>null)]);
  user = _u; records = _r; S = _s;
  const _tiers = _td?.tiers || DEFAULT_TIERS;
  const _tier = getTierForScore(user?.totalScore || 0, _tiers);
  if (!isAdminView) {
    document.getElementById('logoutBtn').style.display='';
    document.getElementById('chipEdit').textContent = '✏️';
  }
  if (!user) { location.href='index.html'; return; }

  // 비밀번호 인증 체크 (관리자뷰 제외)
  if (!isAdminView && user.passwordHash && !isAuthed(uid, user.passwordHash)) {
    location.href = `index.html?auth_required=${encodeURIComponent(uid)}`;
    return;
  }

  setChipData(user, _tier.color);
  document.title = `${user.name} | 마웨그`;

  const stats   = calcStats(records, user);
  const content = document.getElementById('content');

  if (!stats || records.filter(r=>r.weight).length < 2) {
    content.innerHTML=`
      <div class="card text-center" style="padding:48px 20px">
        <div style="font-size:40px;margin-bottom:12px">📭</div>
        <p style="margin-bottom:16px;color:var(--muted)">아직 데이터가 없어요.</p>
        <div class="flex-row gap-8" style="justify-content:center">
          <a href="input.html?user=${uid}" class="btn btn-primary">✏️ 입력</a>
          <a href="import.html?user=${uid}" class="btn btn-ghost">📥 가져오기</a>
        </div>
      </div>`;
    return;
  }

  content.innerHTML=`
    <div class="chart-wrap">
      <canvas id="mainC"></canvas>
    </div><!-- /chart-wrap -->

    <!-- 필터 패널 -->
    <div class="opt-panel">
      <!-- 헤더: 필터 타이틀 + 초기화 버튼 동일선상 -->
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:2px">
        <span style="font-size:12px;font-weight:700;color:var(--text);letter-spacing:.03em">필터</span>
        <button class="zoom-reset-btn" onclick="resetZoom()">🔍 초기화</button>
      </div>
      <div style="width:100%;height:1px;background:var(--border);margin-bottom:2px"></div>

      <span class="opt-label">그래프</span>
      <label class="opt-item"><input type="checkbox" id="t7ma"  ${S.show7dayMA!==false?'checked':''}> 7일평균</label>
      <label class="opt-item"><input type="checkbox" id="tpred" ${S.showPrediction?'checked':''}> 예상그래프</label>
      <div class="opt-sep"></div>

      <span class="opt-label">서브그래프</span>
      <label class="opt-item"><input type="checkbox" id="tbar"      ${S.showWeeklyBar!==false?'checked':''}> 주간막대</label>
      <label class="opt-item"><input type="checkbox" id="tDiet"     ${S.showDietGraph?'checked':''}> 식단</label>
      <label class="opt-item"><input type="checkbox" id="tExercise" ${S.showExerciseGraph?'checked':''}> 운동</label>
      <div class="opt-sep"></div>

      <span class="opt-label">말풍선</span>
      <label class="opt-item"><input type="checkbox" id="mMax" ${S.showMaxMarker!==false?'checked':''}> 최고</label>
      <label class="opt-item"><input type="checkbox" id="mMin" ${S.showMinMarker!==false?'checked':''}> 최저</label>
      <label class="opt-item"><input type="checkbox" id="mCur" ${S.showCurMarker!==false?'checked':''}> 현재</label>
      <div class="opt-sep"></div>

      <span class="opt-label">스탯</span>
      <label class="opt-item"><input type="checkbox" id="sPeriod"  ${S.showStatPeriod!==false?'checked':''}> 기간</label>
      <label class="opt-item"><input type="checkbox" id="sStart"   ${S.showStatStart!==false?'checked':''}> 시작</label>
      <label class="opt-item"><input type="checkbox" id="sCur"     ${S.showStatCurrent!==false?'checked':''}> 현재</label>
      <label class="opt-item"><input type="checkbox" id="sLoss"    ${S.showStatLoss!==false?'checked':''}> 총감량</label>
      <label class="opt-item"><input type="checkbox" id="sRatio"   ${S.showStatRatio!==false?'checked':''}> 비율</label>
      <label class="opt-item"><input type="checkbox" id="sDaily"   ${S.showStatDaily!==false?'checked':''}> 일평균</label>
      <label class="opt-item"><input type="checkbox" id="sWeekly"  ${S.showStatWeekly!==false?'checked':''}> 주평균</label>
      <label class="opt-item"><input type="checkbox" id="sGoal"    ${S.showStatGoal!==false?'checked':''}> 목표</label>
      <label class="opt-item"><input type="checkbox" id="sETA"     ${S.showStatETA!==false?'checked':''}> 예상일</label>
      <label class="opt-item"><input type="checkbox" id="sBMI"     ${S.showStatBMI!==false?'checked':''}> BMI</label>
      <label class="opt-item"><input type="checkbox" id="sStreak"  ${S.showStatStreak!==false?'checked':''}> 연속감량</label>
    </div>

    <div class="stats-grid mt-12" id="statsGrid"></div>

    `;

  doRender();
  renderStats(stats);
  bindToggles(stats);
  checkTodayAlert();
}

// ── 프로필 이모지 수정 ────────────────────────────────────────────────
const EMOJIS = [
  '⚖️','💪','🔥','👑','🏃','🌟','🎯','😤',
  '🦁','🐯','🐻','🐺','🦊','🐸','🐼','🦋',
  '🍎','🥗','🥑','🎽','🏋️','🚴','🧘','💎',
  '🌈','⚡','🎖️','🏆','🌙','☀️','💫','✨',
];
let selectedProfileEmoji = '';

window.openProfileEdit = () => {
  if(isAdminView) return;
  selectedProfileEmoji = document.getElementById('chipEmoji').textContent;
  const grid = document.getElementById('profileEmojiGrid');
  grid.innerHTML = EMOJIS.map(e =>
    `<button style="font-size:22px;padding:4px;border-radius:7px;cursor:pointer;background:${e===selectedProfileEmoji?'rgba(0,229,170,.15)':'transparent'};border:2px solid ${e===selectedProfileEmoji?'var(--teal)':'transparent'};transition:all .15s" onclick="pickProfileEmoji('${e}')">${e}</button>`
  ).join('');
  document.getElementById('profileCustomEmoji').value = '';
  document.getElementById('profileHeight').value    = user.height    || '';
  document.getElementById('profileBirthYear').value = user.birthYear || '';

  // 칭호 섹션 (보유한 칭호만 표시)
  const earnedTitles = user.earnedTitles || [];
  const titleGroup = document.getElementById('profileTitleGroup');
  const titleSection = document.getElementById('profileTitleSection');
  if (earnedTitles.length > 0) {
    titleGroup.style.display = '';
    const currentTitle = user.selectedTitle || '';
    titleSection.innerHTML = `
      <select class="input-field" id="profileTitleSelect">
        <option value="">칭호 없음</option>
        ${earnedTitles.map(t => `<option value="${t}" ${t===currentTitle?'selected':''}>${t}</option>`).join('')}
      </select>`;
  } else {
    titleGroup.style.display = 'none';
  }

  // 비밀번호 섹션
  const hasPw = !!user.passwordHash;
  document.getElementById('profilePwLabel').textContent = hasPw ? '비밀번호 변경' : '비밀번호 설정 (선택)';
  document.getElementById('profilePwSection').innerHTML = `
    <input class="input-field" id="profileNewPw" type="password" inputmode="numeric"
      maxlength="4" placeholder="${hasPw?'새 비밀번호 4자리':'비워두면 공개'}" style="margin-bottom:8px">
    <input class="input-field" id="profileNewPwC" type="password" inputmode="numeric"
      maxlength="4" placeholder="확인">
    ${hasPw ? `<button class="btn btn-ghost btn-sm mt-8" onclick="removeProfilePw()" style="color:var(--red);width:100%">🗑 비밀번호 제거</button>` : ''}
  `;

  document.getElementById('profileModal').classList.add('open');
};
window.closeProfileEdit = () => document.getElementById('profileModal').classList.remove('open');

// 프로필 모달 바깥 클릭 시 닫기
document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === document.getElementById('profileModal')) closeProfileEdit();
});
window.pickProfileEmoji = e => {
  selectedProfileEmoji = e;
  document.getElementById('profileCustomEmoji').value = '';
  document.getElementById('profileEmojiGrid').querySelectorAll('button').forEach(b => {
    const isSelected = b.textContent === e;
    b.style.background = isSelected ? 'rgba(0,229,170,.15)' : 'transparent';
    b.style.border = `2px solid ${isSelected ? 'var(--teal)' : 'transparent'}`;
  });
};
window.saveProfileEdit = async () => {
  const custom    = document.getElementById('profileCustomEmoji').value.trim();
  const emoji     = custom || selectedProfileEmoji;
  if(!emoji) return;

  const height    = parseInt(document.getElementById('profileHeight')?.value) || null;
  const birthYear = parseInt(document.getElementById('profileBirthYear')?.value) || null;
  if (!height)    { showToast('키를 입력해주세요','err'); return; }
  if (!birthYear) { showToast('출생연도를 입력해주세요','err'); return; }

  const pw  = document.getElementById('profileNewPw')?.value || '';
  const pwC = document.getElementById('profileNewPwC')?.value || '';
  if (pw && pw !== pwC) { showToast('비밀번호가 일치하지 않아요','err'); return; }
  if (pw && !/^\d{4}$/.test(pw)) { showToast('숫자 4자리로 입력해주세요','err'); return; }

  const selectedTitle = document.getElementById('profileTitleSelect')?.value || user.selectedTitle || null;
  await updateUser(uid, { emoji, selectedTitle, height, birthYear });
  user = { ...user, emoji, selectedTitle, height, birthYear };
  setChipData(user, document.getElementById('chipName')?.style.color || '#00e5aa');

  if (pw) {
    const newHash = await setUserPassword(uid, pw);
    saveAuth(uid, newHash);
    user = { ...user, passwordHash: newHash };
    showToast('프로필 및 비밀번호 변경됨 ✓', 'ok');
  } else {
    showToast('프로필 변경됨 ✓', 'ok');
  }
  closeProfileEdit();
};

window.removeProfilePw = async () => {
  await setUserPassword(uid, null);
  clearAuth();
  user = { ...user, passwordHash: null };
  closeProfileEdit();
  showToast('비밀번호가 제거됐어요', 'ok');
};


window.resetZoom = () => {
  const mc = document.getElementById('mainC');
  if (mc?._chartInstance) mc._chartInstance.resetZoom();
};


function setChipData(u, tierColor) {
  const tc = tierColor || '#00e5aa';
  document.getElementById('chipEmoji').textContent = u.emoji || '⚖️';
  document.getElementById('chipName').textContent  = u.name;
  document.getElementById('chipName').style.color  = tc;
  const wrap = document.getElementById('chipAvatarWrap');
  if (wrap) {
    wrap.className = `avatar-frame chip-avatar${u.selectedBorder ? ' border-'+u.selectedBorder : ''}`;
    wrap.style.setProperty('--tier-color', tc);
  }
  const titleEl = document.getElementById('chipTitle');
  if (titleEl) {
    titleEl.textContent  = u.selectedTitle || '';
    titleEl.style.color  = tc;
    titleEl.style.display = u.selectedTitle ? '' : 'none';
  }
  const scoreEl = document.getElementById('chipScore');
  if (scoreEl) scoreEl.textContent = (u.totalScore > 0) ? `${u.totalScore} PT` : '';
}

function checkTodayAlert() {
  const todayStr = toDateStr(new Date());
  const rec = records.find(r => r.date === todayStr);
  const missing = [];
  if (rec?.weight == null) missing.push('체중');
  const meal = rec?.meal || {};
  if (!meal.morning) missing.push('아침');
  if (!meal.lunch)   missing.push('점심');
  if (!meal.dinner)  missing.push('저녁');
  if (rec?.exercise == null) missing.push('운동');

  const el = document.getElementById('todayAlert');
  if (!el) return;
  if (!missing.length) { el.innerHTML = ''; return; }

  el.innerHTML = `<a href="input.html?user=${uid}"
    style="display:inline-flex;align-items:center;gap:5px;
           background:rgba(255,167,38,.12);border:1px solid rgba(255,167,38,.3);
           border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;
           color:var(--orange);text-decoration:none;white-space:nowrap;
           max-width:100%;overflow:hidden;text-overflow:ellipsis">
    ⚠️ 오늘 미입력: ${missing.join(' · ')}
  </a>`;
}

function doRender() {
  const mainC=document.getElementById('mainC');
  if(mainC) {
    renderChart(records, user, mainC, null, S);
    bindWheelScroll(mainC);
  }
}

function bindWheelScroll(canvas) {
  // 이전 리스너 제거 후 재등록
  if(canvas._wheelHandler) canvas.removeEventListener('wheel', canvas._wheelHandler, true);
  canvas._wheelHandler = e => {
    const chart = canvas._chartInstance;
    if(!chart) return;
    const xs = chart.scales.x;
    const fullRange = (canvas._endTs - canvas._startTs);
    const isMaxOut  = (xs.max - xs.min) >= fullRange * 0.98;
    if(isMaxOut && e.deltaY > 0) {
      // 줌아웃 최대 + 아래로 스크롤 → zoom 플러그인 차단, 페이지 스크롤 허용
      e.stopImmediatePropagation();
    }
  };
  canvas.addEventListener('wheel', canvas._wheelHandler, {capture:true, passive:true});
}

const fmt = d => {
  const dt=new Date(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
};

function renderStats(stats) {
  if (!stats) return;
  const sg=document.getElementById('statsGrid'); if(!sg) return;
  const sc=(label,value,cls='')=>
    `<div class="stat-card ${cls}"><div class="s-label">${label}</div><div class="s-value">${value}</div></div>`;
  const cards=[
    S.showStatPeriod!==false  && sc('📅 기간',`${fmt(stats.startDate)} ~<br>${fmt(stats.endDate)}<br>(${stats.days}일)`),
    S.showStatStart!==false   && sc('🏁 시작 체중',`${stats.startW.toFixed(1)} kg`),
    S.showStatCurrent!==false && sc('📍 현재 체중',`${stats.curW.toFixed(1)} kg`,'highlight'),
    S.showStatLoss!==false    && sc('📉 총 감량',`-${stats.loss} kg`),
    S.showStatRatio!==false   && sc('📊 감량 비율',`${stats.ratio} %`),
    S.showStatDaily!==false   && sc('📆 일 평균',`-${stats.daily} kg/day`),
    S.showStatWeekly!==false  && sc('📅 주 평균',`-${stats.weekly} kg/week`),
    S.showStatGoal!==false    && sc('🎯 목표까지',`${stats.remaining} kg 남음`),
    S.showStatETA!==false     && sc('🏆 달성 예상일',stats.etaStr,'warn'),
    S.showStatBMI!==false && stats.bmi && sc('⚖️ 현재 BMI',stats.bmi),
    S.showStatStreak!==false && stats.currentStreak>0 && sc('🔥 연속 감량',`${stats.currentStreak}주 연속`),
    S.showStatStreak!==false && stats.maxStreak>0     && sc('🏅 최장 연속',`${stats.maxStreak}주`),
  ].filter(Boolean);
  sg.innerHTML = cards.join('');
}

function bindToggles(stats) {
  // 그래프 토글
  const bind=(id, key, extra)=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      if(extra) extra(e.target.checked);
      await updateSettings({[key]:e.target.checked});
      doRender(); renderStats(stats);
    });
  };
  bind('t7ma','show7dayMA');
  bind('tbar','showWeeklyBar');
  bind('tpred','showPrediction');

  // 서브그래프 토글 (주간막대, 식단, 운동 — 모두 doRender로 재드로우)
  document.getElementById('tDiet')?.addEventListener('change', async e => {
    S = {...S, showDietGraph: e.target.checked};
    await updateSettings({ showDietGraph: e.target.checked });
    doRender();
  });
  document.getElementById('tExercise')?.addEventListener('change', async e => {
    S = {...S, showExerciseGraph: e.target.checked};
    await updateSettings({ showExerciseGraph: e.target.checked });
    doRender();
  });

  // 스탯 토글
  const statBinds=[
    ['sPeriod','showStatPeriod'],['sStart','showStatStart'],['sCur','showStatCurrent'],
    ['sLoss','showStatLoss'],['sRatio','showStatRatio'],['sDaily','showStatDaily'],
    ['sWeekly','showStatWeekly'],['sGoal','showStatGoal'],['sETA','showStatETA'],
    ['sBMI','showStatBMI'],['sStreak','showStatStreak'],
  ];
  // 말풍선 토글
  const markerBinds=[['mMax','showMaxMarker'],['mMin','showMinMarker'],['mCur','showCurMarker']];
  markerBinds.forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      await updateSettings({[key]:e.target.checked});
      doRender();
    });
  });
  statBinds.forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('change', async e=>{
      S={...S,[key]:e.target.checked};
      await updateSettings({[key]:e.target.checked});
      renderStats(stats);
    });
  });
}

render().catch(e=>{
  document.getElementById('content').innerHTML=
    `<div class="card"><p class="text-muted">오류: ${e.message}</p></div>`;
});

// 창 크기 바뀌면 두 차트 재렌더 (padding 재계산)
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if(document.getElementById('mainC')) doRender();
  }, 200);
});

// 그래프 바깥 터치 시 툴팁 닫기
document.addEventListener('touchstart', e => {
  const c = document.getElementById('mainC');
  if (c && !c.contains(e.target) && c._chartInstance) {
    c._chartInstance.tooltip.setActiveElements([], {x:0,y:0});
    c._chartInstance.update();
  }
}, {passive:true});

</script>
