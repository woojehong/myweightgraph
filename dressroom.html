function renderGrid(){$('grid').innerHTML=filtered().map(item=>{const own=ownsItemV2(user,item.id),rar=RARITY_META[item.rarity];return`<button class="sr-item ${selected(item)?'selected':''} ${own?'':'unowned'}" data-item="${item.id}">${renderCatalogPreviewV2(item)}<b style="color:${rar.color}">${esc(item.name)}</b><small>${rar.label} · 🪙 ${item.price.toLocaleString('ko-KR')}</small>${own?'<span class="sr-owned">보유 · 클릭해 장착</span>':`<span class="sr-buy" data-buy="${item.id}">즉시 구매</span>`}</button>`}).join('');$('grid').querySelectorAll('[data-item]').forEach(b=>b.onclick=e=>{const id=e.target.closest('[data-buy]')?.dataset.buy,item=ALL_CATALOG_V2.find(x=>x.id===(id||b.dataset.item));if(id){e.stopPropagation();buy([id])}else choose(item)})}

function renderPreview(){const card=$('preview'),title=titleInfoV2(draft),has=records.filter(r=>r.weight!=null).length>=2;card.querySelector('canvas')?._chartInstance?.destroy?.();card.innerHTML=`<div class="sr-profile-head">${profileVisualForUserV2(user,48,draft)}<div class="sr-profile-copy">${title?`<span class="sr-title" style="color:${title.color}">${esc(title.name)}</span>`:''}<span class="sr-name">${esc(user?.name||'사용자')}</span></div>${previewMarkers()}</div><div class="sr-chart" data-main-weight-plot="true" data-chart-subgraphs="diet exercise">${has?'<canvas id="chart"></canvas>':'<div class="sr-empty">체중 기록이 2개 이상이면 실제 그래프가 표시됩니다.</div>'}</div>`;applyCardV2(card,draft);const plot=card.querySelector('[data-main-weight-plot="true"]');if(plot){decorateMainPlotV2(plot,draft);if(has)requestAnimationFrame(()=>renderChart(records,user,$('chart'),null,{...settings,showWeeklyBar:false,showWeeklyAvgLine:false,showDietGraph:false,showExerciseGraph:false,gridCell:true,mainPlotAspectRatio:16/9,chartDecorations:getChartDecorationsV2(draft)}))}}
async function buy(ids){try{const res=await purchaseCatalogItemsV2(uid,ids);user.purchasedItemsV2=[...new Set([...(user.purchasedItemsV2||[]),...res.purchased])];user.coins=res.coins;toast(res.purchased.length?`${res.purchased.length}종 구매 완료`:'이미 보유한 스킨입니다.');renderGrid();sync()}catch(e){toast(e.message,true)}}
$('bundleBtn').onclick=()=>buy(unownedSelectionV2(user,draft).map(i=>i.id));$('saveBtn').onclick=async()=>{const missing=unownedSelectionV2(user,draft);if(missing.length){toast('미보유 스킨을 먼저 구매하세요.',true);return}try{saved=await saveShowroomLoadoutV2(uid,draft);draft=normalizeLoadoutV2(saved);toast('공개 장착 설정을 저장했습니다.');sync()}catch(e){toast(e.message,true)}};$('resetBtn').onclick=()=>{draft=normalizeLoadoutV2(SHOWROOM_DEFAULTS);renderGrid();renderPreview();sync()};$('revertBtn').onclick=()=>{draft=normalizeLoadoutV2(saved);renderGrid();renderPreview();sync()};['search','rarity','ownership'].forEach(id=>$(id).oninput=renderGrid);$('logoutBtn')?.addEventListener('click',()=>{clearAuth();localStorage.removeItem('uid');location.href='index.html'});
const DEFAULT_OPTIONS={graph_skin:['기본 그래프','📈'],line_style:['기본 그래프 선','〰️'],card_theme:['기본 카드','▭'],point_marker:['기본 포인트','●'],companion:['동반자 없음','—'],ambient_effect:['효과 없음','○'],trophy:['트로피 전시 안 함','∅'],profile_emoji:['기본 이모티콘(🙂)','🙂'],emoji_border:['테두리 없음','◌'],title:['칭호 없음','—']};
function defaultSelected(){return category==='trophy'?draft.trophy.length===0:draft[category]==null}
function chooseDefault(){if(category==='trophy')draft.trophy=[];else draft[category]=null;if(category==='line_style'){delete draft.lineColor;delete draft.lineWidth}renderGrid();renderPreview();sync()}
function defaultCard(){const q=$('search').value.trim().toLowerCase(),o=$('ownership').value,[name,glyph]=DEFAULT_OPTIONS[category];if(o==='unowned'||(q&&!`${name} 기본 없음 무료`.toLowerCase().includes(q)))return'';return`<button class="sr-item sr-default ${defaultSelected()?'selected':''}" data-default-option="${category}"><span class="v2-item-glyph" aria-hidden="true" style="font-size:30px">${glyph}</span><b>${name}</b><small>항상 보유 · 무료</small><span class="sr-owned">기본값 선택</span></button>`}
function renderGridV2(){renderTrophyOrder();renderLineControls();renderCompanionControls();$('grid').innerHTML=defaultCard()+filtered().map(item=>{const own=ownsItemV2(user,item.id),rar=RARITY_META[item.rarity],locked=item.acquisition==='achievement_only',testOnly=item.testOnly===true;return`<button class="sr-item ${selected(item)?'selected':''} ${own?'':'unowned'} ${testOnly?'test-only':''}" data-item="${item.id}">${renderCatalogPreviewV2(item)}<b style="color:${rar.color}">${esc(item.name)}</b><small>${rar.label} · ${locked?'업적 전용':testOnly?'테스트 아이템':`🪙 ${item.price.toLocaleString('ko-KR')}`}</small>${locked?(own?'<span class="sr-owned">보유 · 전시 순서 편집 가능</span>':'<span class="sr-test">업적 전용 · 구매 불가</span>'):testOnly?'<span class="sr-test">테스트 중 · 구매 불가</span>':own?'<span class="sr-owned">보유 · 클릭해 장착</span>':`<span class="sr-buy" data-buy="${item.id}">구매</span>`}</button>`}).join('');$('grid').querySelector('[data-default-option]')?.addEventListener('click',chooseDefault);$('grid').querySelectorAll('[data-item]').forEach(b=>b.onclick=e=>{const id=e.target.closest('[data-buy]')?.dataset.buy,item=ALL_CATALOG_V2.find(x=>x.id===(id||b.dataset.item));if(id){e.stopPropagation();confirmBuy([id])}else choose(item)})}
function buyConfirmProxy(ids){confirmBuy(ids)}
function purchasableSelection(){return unownedSelectionV2(user,draft).filter(item=>item.purchasable!==false&&!item.testOnly&&item.acquisition!=='achievement_only')}
function selectedTestItems(){return V2_CATEGORIES.flatMap(cat=>Array.isArray(draft[cat])?draft[cat]:(draft[cat]?[draft[cat]]:[])).map(id=>ALL_CATALOG_V2.find(item=>item.id===id)).filter(item=>item?.testOnly)}
function syncV2(){const missing=unownedSelectionV2(user,draft),buyable=purchasableSelection(),tests=selectedTestItems().length,cost=buyable.reduce((s,i)=>s+i.price,0),locked=missing.filter(item=>item.acquisition==='achievement_only').length;$('dirty').textContent=dirty()?'세션 미리보기 조합':'';const names=buyable.map(i=>`${i.name}(${RARITY_META[i.rarity].label} 🪙${i.price.toLocaleString('ko-KR')})`).join(' + ');
$('bundleText').textContent=tests?`테스트 아이템 ${tests}종 제외${buyable.length?` · ${names}`:''}`:buyable.length?`${names} = 🪙 ${cost.toLocaleString('ko-KR')}`:locked?`업적 전용 ${locked}종은 구매할 수 없습니다.`:'현재 조합 모두 보유';$('bundleBtn').disabled=!buyable.length||user.coins<cost;$('wallet').textContent=`🪙 ${(user.coins||0).toLocaleString('ko-KR')}`}
function confirmBuy(ids){const items=[...new Set(ids)].map(id=>ALL_CATALOG_V2.find(x=>x.id===id)).filter(item=>item&&!item.testOnly&&item.purchasable!==false&&!ownsItemV2(user,item.id)&&item.acquisition!=='achievement_only');if(!items.length){toast('테스트 아이템은 구매할 수 없습니다.',true);return}const cost=items.reduce((sum,item)=>sum+item.price,0),before=Number(user.coins)||0;$('buyConfirmItems').innerHTML=items.map((item,n)=>`<div class="sr-confirm-row"><span style="display:flex;flex-direction:column;gap:2px;text-align:left"><span style="font-size:11px;color:var(--muted)">${n+1}. ${esc((CATEGORY_META[item.category]?.icon||'')+' '+(CATEGORY_META[item.category]?.name||item.category))}</span><span><b style="color:${RARITY_META[item.rarity].color}">${esc(item.name)}</b> <span style="font-size:11px;color:${RARITY_META[item.rarity].color}">${RARITY_META[item.rarity].label}</span></span></span><span style="white-space:nowrap">🪙 ${item.price.toLocaleString('ko-KR')}</span></div>`).join('');
const after=before-cost,short=after<0;
$('buyConfirmTotal').innerHTML=`<div style="display:flex;justify-content:space-between"><span>${items.length}종 합계</span><b>🪙 ${cost.toLocaleString('ko-KR')}</b></div><div style="display:flex;justify-content:space-between;margin-top:4px;font-size:12px;color:var(--muted)"><span>보유 코인</span><span>🪙 ${before.toLocaleString('ko-KR')}</span></div><div style="display:flex;justify-content:space-between;margin-top:2px;font-size:12px"><span style="color:var(--muted)">구매 후 잔액</span><b style="color:${short?'var(--red)':'var(--teal)'}">🪙 ${after.toLocaleString('ko-KR')}</b></div>${short?`<div style="margin-top:6px;font-size:12px;color:var(--red)">코인이 ${(-after).toLocaleString('ko-KR')} 부족합니다.</div>`:''}`;
$('buyProceed').disabled=short;$('buyProceed').onclick=()=>confirmedBuy(items.map(item=>item.id));$('buyConfirm').classList.add('open')}
async function confirmedBuy(ids){const proceed=$('buyProceed');try{proceed.disabled=true;proceed.textContent='처리 중…';const res=await purchaseCatalogItemsV2(uid,ids);user.purchasedItemsV2=[...new Set([...(user.purchasedItemsV2||[]),...res.purchased])];user.coins=res.coins;toast(res.purchased.length?`${res.purchased.length}종 구매 완료`:'이미 보유한 스킨입니다.');$('buyConfirm').classList.remove('open');renderGrid();sync()}catch(e){toast(e.message,true)}finally{proceed.textContent='구매 확정';proceed.disabled=(Number(user.coins)||0)<ids.reduce((s,id)=>{const it=ALL_CATALOG_V2.find(x=>x.id===id);return s+(it&&!ownsItemV2(user,id)?it.price:0)},0)}}
$('buyCancel').onclick=()=>$('buyConfirm').classList.remove('open');renderGrid=renderGridV2;buy=buyConfirmProxy;sync=syncV2;$('bundleBtn').onclick=()=>{const items=purchasableSelection();items.length?confirmBuy(items.map(item=>item.id)):toast('테스트 아이템은 구매할 수 없습니다.',true)};$('saveBtn').onclick=async()=>{if(selectedTestItems().length){toast('테스트 아이템은 세션 미리보기 전용이며 저장할 수 없습니다.',true);return}try{saved=await saveShowroomLoadoutV2(uid,draft);draft=normalizeLoadoutV2(saved);toast('기본 장착 설정을 저장했습니다.');sync()}catch(e){toast(e.message,true)}};
async function init(){nav();user=await getUser(uid);if(!user){location.href='index.html';return}if(user.passwordHash&&!isAuthed(uid,user.passwordHash)){location.href='index.html?select=1';return}[records,settings]=await Promise.all([getWeights(uid),getSettings(uid,user)]);saved=normalizeLoadoutV2(user.showroomLoadoutV2);draft=normalizeLoadoutV2(saved);renderCats();renderGrid();renderPreview();sync()}nav();renderCats();init().catch(e=>toast(e.message,true));
</script><script src="register-sw.js"></script></body></html>
