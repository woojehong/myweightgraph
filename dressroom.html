<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#080c13"><link rel="manifest" href="manifest.json"><link rel="icon" href="favicon.png"><link rel="stylesheet" href="css/style.css"><title>쇼룸 | 마웨그</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
body{background:#080c13}.sr-shell{max-width:1240px;margin:auto;padding:16px 14px 92px}.sr-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.sr-head h1{font-size:24px;margin:0}.sr-head p{font-size:11px;color:var(--muted);margin:3px 0 0}.sr-wallet{color:#ffd54f;font-weight:800;white-space:nowrap}.sr-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.sr-layout{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(340px,.75fr);gap:12px;align-items:start;min-width:0}.sr-panel{background:rgba(13,18,27,.9);border:1px solid var(--border);border-radius:14px;padding:12px;min-width:0}.sr-preview-label{display:flex;justify-content:space-between;color:var(--muted);font-size:10px;margin-bottom:8px}.sr-dirty{color:#ffd166}.sr-card{border:1px solid var(--border);border-radius:12px;padding:9px 3px 4px;background:var(--surface);min-height:315px}.sr-profile-head{display:flex;align-items:center;gap:9px;padding:0 9px 8px}.sr-profile-copy{display:flex;flex-direction:column;line-height:1.25}.sr-title{font-size:10px;font-weight:800}.sr-name{font-size:14px;font-weight:800}.sr-chart{min-height:250px}.sr-empty{min-height:245px;display:grid;place-items:center;color:var(--muted);font-size:12px}.sr-cats{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px}.sr-cat{flex:0 0 auto;padding:7px 9px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--muted);font-size:10px}.sr-cat.active{color:var(--teal);border-color:var(--teal);background:#00e5aa15}.sr-tools{display:grid;grid-template-columns:1fr 110px 110px;gap:6px;margin:7px 0 10px}.sr-tools input,.sr-tools select{min-width:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;font-size:11px}.sr-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;max-height:590px;overflow-y:auto;padding-right:2px}.sr-item{position:relative;min-width:0;min-height:150px;padding:8px 6px;border:1px solid var(--border);border-radius:10px;background:#ffffff05;color:var(--text);display:flex;flex-direction:column;align-items:center;text-align:center}.sr-item.selected{border-color:var(--teal);box-shadow:inset 0 0 0 1px #00e5aa55;background:#00e5aa0c}.sr-item.unowned{border-style:dashed}.sr-item b{font-size:10px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sr-item small{font-size:8px;color:var(--muted);margin-top:2px}.sr-item .v2-item-glyph,.sr-item .v2-profile{margin:auto}.sr-buy{width:100%;margin-top:5px;padding:5px;border:1px solid #ffd54f66;border-radius:7px;background:#ffd54f12;color:#ffd54f;font-size:9px;font-weight:800}.sr-owned{font-size:9px;color:var(--teal);margin-top:7px}.sr-bulk{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 10px;margin-top:9px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);font-size:10px}.sr-toast{position:fixed;left:50%;bottom:76px;transform:translate(-50%,15px);opacity:0;z-index:500;background:#111a25;border:1px solid var(--teal);border-radius:9px;padding:9px 14px;font-size:12px;pointer-events:none;transition:.2s}.sr-toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:860px){.sr-layout{grid-template-columns:1fr}.sr-grid{max-height:none}.sr-panel{min-width:0}}@media(max-width:520px){.sr-shell{padding:10px 8px 86px}.sr-head{align-items:flex-start}.sr-head>div:first-child p{max-width:180px}.sr-actions{max-width:145px}.sr-actions .btn{padding:7px 9px;font-size:10px}.sr-tools{grid-template-columns:1fr 92px}.sr-tools select:last-child{grid-column:1/-1}.sr-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.sr-item{min-height:145px}.sr-card{min-height:285px}.sr-chart,.sr-empty{min-height:215px}}@media(max-width:340px){.sr-item{padding:6px 3px}.sr-grid{gap:5px}}
.sr-confirm{position:fixed;inset:0;z-index:700;background:#000a;display:none;place-items:center;padding:16px}.sr-confirm.open{display:grid}.sr-confirm-card{width:min(430px,100%);max-height:80vh;overflow:auto;background:#111925;border:1px solid var(--border);border-radius:16px;padding:16px}.sr-confirm-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #ffffff12;font-size:11px}.sr-confirm-total{margin-top:12px;line-height:1.7;font-size:12px}.sr-confirm-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.sr-test{font-size:9px;color:#ffd166;margin-top:7px;font-weight:800}.sr-item.test-only{border-style:dashed;border-color:#ffd16666}
</style></head><body>
<header class="top-bar"><div></div><a href="index.html?select=1" class="mweg-header-wrap"><span class="mweg-title">마웨그</span><span class="mweg-subtitle">My Weight Graph</span></a><button class="btn btn-ghost btn-sm" id="logoutBtn">로그아웃</button></header>
<main class="sr-shell"><div class="sr-head"><div><h1>쇼룸</h1><p>스킨 탐색·미리보기·구매·장착을 한곳에서 관리합니다.</p></div><div><div class="sr-wallet" id="wallet">🪙 0</div><div class="sr-actions"><button class="btn btn-ghost btn-sm" id="resetBtn">초기화</button><button class="btn btn-ghost btn-sm" id="revertBtn">되돌리기</button><button class="btn btn-primary btn-sm" id="saveBtn">최종 저장</button></div></div></div>
<div class="sr-layout"><section class="sr-panel"><div class="sr-preview-label"><span>실제 우리 그래프 카드</span><span class="sr-dirty" id="dirty"></span></div><article id="preview" class="sr-card"><div class="loading"><div class="spinner"></div></div></article></section>
<section class="sr-panel"><div class="sr-cats" id="cats"></div><div class="sr-tools"><input id="search" placeholder="현재 범주 4종 검색"><select id="rarity"><option value="">전체 등급</option><option value="common">일반</option><option value="uncommon">고급</option><option value="rare">희귀</option><option value="epic">영웅</option><option value="legendary">전설</option></select><select id="ownership"><option value="">전체 보유 상태</option><option value="owned">보유</option><option value="unowned">미보유</option></select></div><div class="sr-grid" id="grid"></div><div class="sr-bulk"><span id="bundleText">현재 조합을 확인하세요.</span><button class="btn btn-primary btn-sm" id="bundleBtn">현재 조합 일괄 구매</button></div></section></div></main><nav class="bottom-nav" id="bottomNav"></nav><div class="sr-toast" id="toast"></div>
<div class="sr-confirm" id="buyConfirm" role="dialog" aria-modal="true" aria-labelledby="buyConfirmTitle"><div class="sr-confirm-card"><h2 id="buyConfirmTitle">구매 확인</h2><div id="buyConfirmItems"></div><div class="sr-confirm-total" id="buyConfirmTotal"></div><div class="sr-confirm-actions"><button class="btn btn-ghost" id="buyCancel">취소</button><button class="btn btn-primary" id="buyProceed">구매 확정</button></div></div></div>
<script type="module">
import{getUser,getWeights,getSettings,purchaseCatalogItemsV2,saveShowroomLoadoutV2}from'./js/db.js';import{isAuthed,clearAuth}from'./js/auth.js';import{renderChart}from'./js/chart-render.js';import{esc}from'./js/util.js';import{SHOWROOM_DEFAULTS}from'./js/showroom-catalog-v2.js';import{ALL_CATALOG_V2,V2_CATEGORIES,CATEGORY_META,RARITY_META,normalizeLoadoutV2,ownedItemIdsV2,ownsItemV2,unownedSelectionV2,renderCatalogPreviewV2,profileVisualV2,titleInfoV2,getChartDecorationsV2,applyCardV2,decoratePlotV2}from'./js/showroom-v2.js';
const uid=new URLSearchParams(location.search).get('user')||localStorage.getItem('uid');if(!uid)location.href='index.html';const $=id=>document.getElementById(id);let user,records=[],settings={},saved=normalizeLoadoutV2(),draft=normalizeLoadoutV2(),category='graph_skin',timer;
function nav(){const links=[['input','✏️','데이터 입력'],['dashboard','📊','내 그래프'],['compare','👥','우리 그래프'],['achievements','🏆','업적'],['dressroom','✨','쇼룸']];$('bottomNav').innerHTML=links.map(([id,icon,label])=>`<a href="${id}.html?user=${uid}" class="${id==='dressroom'?'active':''}"><span class="icon">${icon}</span>${label}</a>`).join('')}
function toast(msg,err=false){const el=$('toast');el.textContent=msg;el.style.borderColor=err?'var(--red)':'var(--teal)';el.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>el.classList.remove('show'),2500)}function dirty(){return JSON.stringify(saved)!==JSON.stringify(draft)}function sync(){const missing=unownedSelectionV2(user,draft),cost=missing.reduce((s,i)=>s+i.price,0);$('dirty').textContent=dirty()?'저장 전 임시 조합':'';$('bundleText').textContent=missing.length?`미보유 ${missing.length}종 · 🪙 ${cost.toLocaleString('ko-KR')}`:'현재 조합 모두 보유';$('bundleBtn').disabled=!missing.length||user.coins<cost;$('wallet').textContent=`🪙 ${(user.coins||0).toLocaleString('ko-KR')}`}
function renderCats(){$('cats').innerHTML=V2_CATEGORIES.map(id=>`<button class="sr-cat ${id===category?'active':''}" data-cat="${id}">${CATEGORY_META[id].icon} ${CATEGORY_META[id].name}</button>`).join('');$('cats').querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{category=b.dataset.cat;renderCats();renderGrid()})}
function selected(item){const v=draft[item.category];return Array.isArray(v)?v.includes(item.id):v===item.id}function choose(item){if(item.category==='trophy'){const cur=draft.trophy;if(cur.includes(item.id))draft.trophy=cur.filter(id=>id!==item.id);else if(cur.length>=4){toast('트로피는 최대 4개입니다.',true);return}else draft.trophy=[...cur,item.id]}else draft[item.category]=item.id;if(item.testOnly)toast('테스트 아이템을 세션에서 미리보는 중입니다.');else if(!ownsItemV2(user,item.id))toast('미보유 스킨을 미리보기 중입니다.');renderGrid();renderPreview();sync()}
function filtered(){const q=$('search').value.trim().toLowerCase(),r=$('rarity').value,o=$('ownership').value;return ALL_CATALOG_V2.filter(i=>i.category===category&&(!q||`${i.name} ${i.id} ${i.visual}`.toLowerCase().includes(q))&&(!r||i.rarity===r)&&(!o||(o==='owned')===ownsItemV2(user,i.id)))}
function renderGrid(){$('grid').innerHTML=filtered().map(item=>{const own=ownsItemV2(user,item.id),rar=RARITY_META[item.rarity];return`<button class="sr-item ${selected(item)?'selected':''} ${own?'':'unowned'}" data-item="${item.id}">${renderCatalogPreviewV2(item)}<b style="color:${rar.color}">${esc(item.name)}</b><small>${rar.label} · 🪙 ${item.price.toLocaleString('ko-KR')}</small>${own?'<span class="sr-owned">보유 · 클릭해 장착</span>':`<span class="sr-buy" data-buy="${item.id}">즉시 구매</span>`}</button>`}).join('');$('grid').querySelectorAll('[data-item]').forEach(b=>b.onclick=e=>{const id=e.target.closest('[data-buy]')?.dataset.buy,item=ALL_CATALOG_V2.find(x=>x.id===(id||b.dataset.item));if(id){e.stopPropagation();buy([id])}else choose(item)})}
function renderPreview(){const card=$('preview'),title=titleInfoV2(draft),has=records.filter(r=>r.weight!=null).length>=2;card.querySelector('canvas')?._chartInstance?.destroy?.();card.innerHTML=`<div class="sr-profile-head">${profileVisualV2(draft,48)}<div class="sr-profile-copy">${title?`<span class="sr-title" style="color:${title.color}">${esc(title.name)}</span>`:''}<span class="sr-name">${esc(user?.name||'사용자')}</span></div></div>${has?'<div class="sr-chart"><canvas id="chart"></canvas></div>':'<div class="sr-empty">체중 기록이 2개 이상이면 실제 그래프가 표시됩니다.</div>'}`;applyCardV2(card,draft);const plot=card.querySelector('.sr-chart');if(plot){decoratePlotV2(plot,draft);requestAnimationFrame(()=>renderChart(records,user,$('chart'),null,{...settings,showWeeklyBar:false,showDietGraph:true,showExerciseGraph:true,gridCell:true,mainPlotAspectRatio:16/9,chartDecorations:getChartDecorationsV2(draft)}))}}
async function buy(ids){try{const res=await purchaseCatalogItemsV2(uid,ids);user.purchasedItemsV2=[...new Set([...(user.purchasedItemsV2||[]),...res.purchased])];user.coins=res.coins;toast(res.purchased.length?`${res.purchased.length}종 구매 완료`:'이미 보유한 스킨입니다.');renderGrid();sync()}catch(e){toast(e.message,true)}}
$('bundleBtn').onclick=()=>buy(unownedSelectionV2(user,draft).map(i=>i.id));$('saveBtn').onclick=async()=>{const missing=unownedSelectionV2(user,draft);if(missing.length){toast('미보유 스킨을 먼저 구매하세요.',true);return}try{saved=await saveShowroomLoadoutV2(uid,draft);draft=normalizeLoadoutV2(saved);toast('공개 장착 설정을 저장했습니다.');sync()}catch(e){toast(e.message,true)}};$('resetBtn').onclick=()=>{draft=normalizeLoadoutV2(SHOWROOM_DEFAULTS);renderGrid();renderPreview();sync()};$('revertBtn').onclick=()=>{draft=normalizeLoadoutV2(saved);renderGrid();renderPreview();sync()};['search','rarity','ownership'].forEach(id=>$(id).oninput=renderGrid);$('logoutBtn').onclick=()=>{clearAuth();localStorage.removeItem('uid');location.href='index.html'};
const DEFAULT_OPTIONS={graph_skin:['기본 그래프','📈'],card_theme:['기본 카드','▭'],point_marker:['기본 포인트','●'],companion:['동반자 없음','—'],ambient_effect:['효과 없음','○'],trophy:['트로피 전시 안 함','∅'],profile_emoji:['기본 이모티콘(⚖️)','⚖️'],emoji_border:['테두리 없음','◌'],title:['칭호 없음','—']};
function defaultSelected(){return category==='trophy'?draft.trophy.length===0:draft[category]==null}
function chooseDefault(){if(category==='trophy')draft.trophy=[];else draft[category]=null;renderGrid();renderPreview();sync()}
function defaultCard(){const q=$('search').value.trim().toLowerCase(),o=$('ownership').value,[name,glyph]=DEFAULT_OPTIONS[category];if(o==='unowned'||(q&&!`${name} 기본 없음 무료`.toLowerCase().includes(q)))return'';return`<button class="sr-item sr-default ${defaultSelected()?'selected':''}" data-default-option="${category}"><span class="v2-item-glyph" aria-hidden="true" style="font-size:30px">${glyph}</span><b>${name}</b><small>항상 보유 · 무료</small><span class="sr-owned">기본값 선택</span></button>`}
function renderGridV2(){$('grid').innerHTML=defaultCard()+filtered().map(item=>{const own=ownsItemV2(user,item.id),rar=RARITY_META[item.rarity],locked=item.acquisition==='achievement_only',testOnly=item.testOnly===true;return`<button class="sr-item ${selected(item)?'selected':''} ${own?'':'unowned'} ${testOnly?'test-only':''}" data-item="${item.id}">${renderCatalogPreviewV2(item)}<b style="color:${rar.color}">${esc(item.name)}</b><small>${rar.label} · ${testOnly?'테스트 아이템':locked?'업적 전용':`🪙 ${item.price.toLocaleString('ko-KR')}`}</small>${testOnly?'<span class="sr-test">테스트 중 · 구매 불가</span>':own?'<span class="sr-owned">보유 · 클릭해 장착</span>':locked?'<span class="sr-owned">업적 달성 보상</span>':`<span class="sr-buy" data-buy="${item.id}">구매</span>`}</button>`}).join('');$('grid').querySelector('[data-default-option]')?.addEventListener('click',chooseDefault);$('grid').querySelectorAll('[data-item]').forEach(b=>b.onclick=e=>{const id=e.target.closest('[data-buy]')?.dataset.buy,item=ALL_CATALOG_V2.find(x=>x.id===(id||b.dataset.item));if(id){e.stopPropagation();confirmBuy([id])}else choose(item)})}
function buyConfirmProxy(ids){confirmBuy(ids)}
function purchasableSelection(){return unownedSelectionV2(user,draft).filter(item=>item.purchasable!==false&&!item.testOnly&&item.acquisition!=='achievement_only')}
function selectedTestItems(){return V2_CATEGORIES.flatMap(cat=>Array.isArray(draft[cat])?draft[cat]:(draft[cat]?[draft[cat]]:[])).map(id=>ALL_CATALOG_V2.find(item=>item.id===id)).filter(item=>item?.testOnly)}
function syncV2(){const missing=unownedSelectionV2(user,draft),buyable=purchasableSelection(),tests=selectedTestItems().length,cost=buyable.reduce((s,i)=>s+i.price,0),locked=missing.filter(item=>item.acquisition==='achievement_only').length;$('dirty').textContent=dirty()?'세션 미리보기 조합':'';$('bundleText').textContent=tests?`테스트 아이템 ${tests}종 제외${buyable.length?` · 구매 가능 ${buyable.length}종`:''}`:buyable.length?`구매 가능 ${buyable.length}종 · 🪙 ${cost.toLocaleString('ko-KR')}`:locked?`업적 전용 ${locked}종은 구매할 수 없습니다.`:'현재 조합 모두 보유';$('bundleBtn').disabled=!buyable.length||user.coins<cost;$('wallet').textContent=`🪙 ${(user.coins||0).toLocaleString('ko-KR')}`}
function confirmBuy(ids){const items=[...new Set(ids)].map(id=>ALL_CATALOG_V2.find(x=>x.id===id)).filter(item=>item&&!item.testOnly&&item.purchasable!==false&&!ownsItemV2(user,item.id)&&item.acquisition!=='achievement_only');if(!items.length){toast('테스트 아이템은 구매할 수 없습니다.',true);return}const cost=items.reduce((sum,item)=>sum+item.price,0),before=Number(user.coins)||0;$('buyConfirmItems').innerHTML=items.map(item=>`<div class="sr-confirm-row"><span><b style="color:${RARITY_META[item.rarity].color}">${esc(item.name)}</b> · ${RARITY_META[item.rarity].label}</span><span>🪙 ${item.price.toLocaleString('ko-KR')}</span></div>`).join('');$('buyConfirmTotal').innerHTML=`합계 <b>🪙 ${cost.toLocaleString('ko-KR')}</b><br>잔액 ${before.toLocaleString('ko-KR')} → <b>${(before-cost).toLocaleString('ko-KR')}</b>`;$('buyProceed').onclick=()=>confirmedBuy(items.map(item=>item.id));$('buyConfirm').classList.add('open')}
async function confirmedBuy(ids){const proceed=$('buyProceed');try{proceed.disabled=true;proceed.textContent='처리 중…';const res=await purchaseCatalogItemsV2(uid,ids);user.purchasedItemsV2=[...new Set([...(user.purchasedItemsV2||[]),...res.purchased])];user.coins=res.coins;toast(res.purchased.length?`${res.purchased.length}종 구매 완료`:'이미 보유한 스킨입니다.');$('buyConfirm').classList.remove('open');renderGrid();sync()}catch(e){toast(e.message,true)}finally{proceed.disabled=false;proceed.textContent='구매 확정'}}
$('buyCancel').onclick=()=>$('buyConfirm').classList.remove('open');renderGrid=renderGridV2;buy=buyConfirmProxy;sync=syncV2;$('bundleBtn').onclick=()=>{const items=purchasableSelection();items.length?confirmBuy(items.map(item=>item.id)):toast('테스트 아이템은 구매할 수 없습니다.',true)};$('saveBtn').onclick=async()=>{if(selectedTestItems().length){toast('테스트 아이템은 세션 미리보기 전용이며 저장할 수 없습니다.',true);return}try{saved=await saveShowroomLoadoutV2(uid,draft);draft=normalizeLoadoutV2(saved);toast('기본 장착 설정을 저장했습니다.');sync()}catch(e){toast(e.message,true)}};
async function init(){nav();user=await getUser(uid);if(!user){location.href='index.html';return}if(user.passwordHash&&!isAuthed(uid,user.passwordHash)){location.href='index.html?select=1';return}[records,settings]=await Promise.all([getWeights(uid),getSettings(uid,user)]);saved=normalizeLoadoutV2(user.showroomLoadoutV2);draft=normalizeLoadoutV2(saved);renderCats();renderGrid();renderPreview();sync()}nav();renderCats();init().catch(e=>toast(e.message,true));
</script><script src="register-sw.js"></script></body></html>
