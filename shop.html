<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>상점 | 마웨그</title>
  <meta property="og:title" content="상점 | 마웨그">
  <meta property="og:description" content="코인으로 테두리와 칭호를 꾸며보세요.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://woojehong.github.io/myweightgraph/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/borders.css">
  <link rel="stylesheet" href="css/avatar-v2.css">
  <style>
    /* ── coin wallet ─────────────────────────────────────────────── */
    .wallet {
      position: relative; overflow: hidden;
      background: var(--surface); border: 1px solid rgba(255,213,79,.35);
      border-radius: 16px; padding: 22px 16px 18px; text-align: center;
    }
    .wallet::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 85% 60% at 50% -10%, rgba(255,213,79,.14) 0%, transparent 70%);
    }
    .wallet-amount {
      display: inline-flex; align-items: baseline; gap: 8px;
      font-size: 38px; font-weight: 900; letter-spacing: -1px; color: #ffd54f;
      line-height: 1;
    }
    .wallet-amount .coin-ico { font-size: 30px; }
    .wallet-amount .coin-unit { font-size: 15px; font-weight: 700; color: rgba(255,213,79,.7); }
    .wallet-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* ── page tabs ───────────────────────────────────────────────── */
    .shop-tabs { display: flex; gap: 6px; margin-top: 14px; }
    .shop-tab {
      flex: 1; padding: 10px 4px; border-radius: 10px; font-size: 13px; font-weight: 700;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      transition: all .15s; white-space: nowrap;
    }
    .shop-tab.active { background: rgba(0,229,170,.1); border-color: rgba(0,229,170,.4); color: var(--teal); }

    /* ── item grids / cards ──────────────────────────────────────── */
    .rarity-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 800; letter-spacing: .06em;
      margin: 18px 0 8px;
    }
    .rarity-head .rh-line { flex: 1; height: 1px; background: var(--border); }
    .shop-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 8px;
    }
    @media (min-width: 600px) { .shop-grid { grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); } }
    .shop-card {
      min-width: 0; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 6px 8px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: border-color .15s;
    }
    .shop-card.equipped { border-color: rgba(0,229,170,.55); background: rgba(0,229,170,.05); }
    .shop-card.locked > .sc-prev, .shop-card.locked > .sc-name { opacity: .4; }
    .sc-prev {
      width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sc-prev .avatar-frame { width: 58px; height: 58px; }
    .sc-prev .bp-inner {
      width: 100%; height: 100%; border-radius: 50%; background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; position: relative; z-index: 1;
    }
    .sc-name {
      width: 100%; font-size: 11px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sc-rarity { font-size: 9px; font-weight: 700; letter-spacing: .04em; }
    .sc-note { font-size: 9px; color: var(--muted); white-space: nowrap; }

    .sc-btn {
      width: 100%; padding: 6px 4px; border-radius: 8px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; transition: all .15s;
    }
    .sc-btn.buy { background: rgba(255,213,79,.12); border: 1px solid rgba(255,213,79,.35); color: #ffd54f; }
    .sc-btn.buy:hover { background: rgba(255,213,79,.2); }
    .sc-btn.buy:disabled { opacity: .35; cursor: not-allowed; }
    .sc-btn.equip { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .sc-btn.equip:hover { border-color: rgba(0,229,170,.4); color: var(--teal); }
    .sc-btn.on { background: rgba(0,229,170,.15); border: 1px solid rgba(0,229,170,.5); color: var(--teal); }
    .sc-btn.lock { background: transparent; border: 1px dashed var(--border); color: var(--muted); cursor: default; }
    .sc-poor { font-size: 9px; color: var(--red); }

    /* ── title rows ──────────────────────────────────────────────── */
    .title-row {
      display: flex; align-items: center; gap: 10px; min-width: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    }
    .title-row.equipped { border-color: rgba(0,229,170,.55); background: rgba(0,229,170,.05); }
    .title-row.locked .tr-badge, .title-row.locked .tr-desc { opacity: .4; }
    .tr-main { flex: 1; min-width: 0; }
    .tr-badge {
      display: inline-block; max-width: 100%; font-size: 12px; font-weight: 800;
      color: var(--teal); border: 1px solid rgba(0,229,170,.35); background: rgba(0,229,170,.07);
      border-radius: 14px; padding: 3px 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .title-row.reward .tr-badge { color: #ffd54f; border-color: rgba(255,213,79,.4); background: rgba(255,213,79,.08); }
    .tr-desc { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tr-btn-wrap { flex-shrink: 0; width: 92px; }
    .tr-btn-wrap .sc-btn { padding: 8px 4px; }

    /* ── buy modal ───────────────────────────────────────────────── */
    .buy-preview { text-align: center; margin-bottom: 12px; }
    .buy-name { font-size: 15px; font-weight: 800; text-align: center; margin-bottom: 10px; word-break: keep-all; }
    .buy-rows { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
    .buy-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
    .buy-row .br-l { color: var(--muted); }
    .buy-row .br-v { font-weight: 700; }
    .buy-row .price { color: #ffd54f; }
    .buy-row .after { color: var(--teal); }

    .shop-section-gap { margin-top: 26px; }
    @keyframes coin-pop { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
    .coin-pop { animation: coin-pop .45s ease; display: inline-block; }
  </style>
</head>
<body>
<header class="top-bar">
  <div></div>
  <a href="index.html?select=1" class="mweg-header-wrap" style="justify-self:center"><span class="mweg-title">마웨그</span><span class="mweg-subtitle">My Weight Graph</span></a>
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <div class="user-chip" id="userChip" style="cursor:default">
      <div id="chipAvatarWrap" class="avatar-frame chip-avatar">
        <div class="chip-avatar-inner"><span id="chipEmoji">⚖️</span></div>
      </div>
      <div class="chip-info">
        <span id="chipTitle" class="chip-title"></span>
        <span id="chipName" class="chip-name">-</span>
        <span id="chipScore" class="chip-score"></span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- purchase confirm modal -->
<div class="modal-bg" id="buyModal">
  <div class="modal">
    <h3>🛒 구매 확인</h3>
    <div class="buy-preview" id="buyPreview"></div>
    <div class="buy-name" id="buyName"></div>
    <div class="buy-rows">
      <div class="buy-row"><span class="br-l">가격</span><span class="br-v price" id="buyPrice"></span></div>
      <div class="buy-row"><span class="br-l">보유 코인</span><span class="br-v" id="buyHave"></span></div>
      <div class="buy-row"><span class="br-l">구매 후 잔액</span><span class="br-v after" id="buyAfter"></span></div>
    </div>
    <div class="flex-row gap-8">
      <button class="btn btn-ghost btn-full" onclick="closeBuy()">취소</button>
      <button class="btn btn-primary btn-full" id="buyConfirmBtn" onclick="confirmBuy()">구매</button>
    </div>
  </div>
</div>

<div class="page">
  <div id="content">
    <div class="loading"><div class="spinner"></div> 상점 불러오는 중...</div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<script type="module">
import { getUser, updateUser, getTierSettings } from './js/db.js';
import { clearAuth, isAuthed } from './js/auth.js';
import { esc } from './js/util.js';
import { RARITY_INFO, getShopBorders, ACH_TITLE_REWARDS } from './js/borders-data.js';
import { getTierForScore, DEFAULT_TIERS } from './js/achievements.js';
import { SHOP_TITLES } from './js/shop-data.js';
import { AVATAR_V2_CATEGORIES, AVATAR_V2_ITEMS, renderAvatarV2, normalizeAvatarV2, ownedAvatarV2Item } from './js/avatar-v2.js';

const uid = new URLSearchParams(location.search).get('user') || localStorage.getItem('uid');
if (!uid) location.href = 'index.html';

const SHOP_BORDERS   = getShopBorders(); // 전체 80종 — 모두 구매 가능 (업적 연동은 달성 시 무료)
const REWARD_TITLE_PRICE = n => n === '챌린저' ? 1200 : 500;
const REWARD_TITLES  = [...new Set(Object.values(ACH_TITLE_REWARDS))];
const RARITY_ORDER   = Object.keys(RARITY_INFO); // common → mythic

let _user = null;
let coins = 0;
let curTab = 'borders';   // borders | titles
let pending = null;       // { kind, id, name, price } — kind: border | title
let _titleRefs = [];      // stable index list for onclick handlers
let _tiers = DEFAULT_TIERS;
let _tier = DEFAULT_TIERS[0];

window.doLogout = () => { clearAuth(); localStorage.removeItem('uid'); location.href = 'index.html'; };

/* ── helpers ─────────────────────────────────────────────────────── */

const arr = v => Array.isArray(v) ? v : [];
const ownsBorder = id => arr(_user.purchasedBorders).includes(id) || arr(_user.unlockedBorders).includes(id);
const ownsTitle  = t  => arr(_user.purchasedTitles).includes(t) || arr(_user.earnedTitles).includes(t);
const tierIndex = id => _tiers.findIndex(t => t.id === id);
const tierEligible = item => !item.minTier || tierIndex(_tier.id) >= tierIndex(item.minTier);
const fmtCoin    = n => n.toLocaleString('ko-KR');

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}

function countTo(el, from, to, duration = 700) {
  const start = performance.now();
  const tick = now => {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = fmtCoin(Math.round(from + (to - from) * eased));
    if (t < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function animateCoins(from, to) {
  const el = document.getElementById('coinAmt');
  if (!el) return;
  countTo(el, from, to, 650);
  const ico = document.getElementById('coinIco');
  if (ico) { ico.classList.remove('coin-pop'); void ico.offsetWidth; ico.classList.add('coin-pop'); }
}

function setChip(u, tierColor) {
  const tc = tierColor || '#00e5aa';
  document.getElementById('chipEmoji').textContent = u.emoji || '⚖️';
  document.getElementById('chipName').textContent  = u.name || '-';
  document.getElementById('chipName').style.color  = tc;
  const wrap = document.getElementById('chipAvatarWrap');
  wrap.className = `avatar-frame chip-avatar${u.selectedBorder ? ' border-' + u.selectedBorder : ''}`;
  wrap.style.setProperty('--tier-color', tc);
  const titleEl = document.getElementById('chipTitle');
  titleEl.textContent = u.selectedTitle || '';
  titleEl.style.color = tc;
  titleEl.style.display = u.selectedTitle ? 'inline' : 'none';
  document.getElementById('chipScore').textContent = (u.totalScore > 0) ? `${u.totalScore} PT` : '';
}

function buildNav() {
  const links = [
    { href: `input.html?user=${uid}`,        icon: '✏️',  label: '데이터 입력', id: 'input' },
    { href: `dashboard.html?user=${uid}`,    icon: '📊', label: '내 그래프',   id: 'dashboard' },
    { href: `compare.html?user=${uid}`,      icon: '👥', label: '모아보기',     id: 'compare' },
    { href: `achievements.html?user=${uid}`, icon: '🏆', label: '업적',        id: 'achievements' },
    { href: `shop.html?user=${uid}`,         icon: '🛍️', label: '상점',        id: 'shop' },
    { href: `dressroom.html?user=${uid}`,    icon: '⚔️', label: '드레스룸',    id: 'dressroom' },
  ];
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = '';
  links.forEach(l => {
    const a = document.createElement('a');
    a.href = l.href; a.className = l.id === 'shop' ? 'active' : '';
    a.innerHTML = `<span class="icon">${l.icon}</span>${l.label}`;
    nav.appendChild(a);
  });
}

/* ── shared card button markup ───────────────────────────────────── */

function buyBtnHtml(onclick, price) {
  const short = coins < price;
  return `
    <button class="sc-btn buy" ${short ? 'disabled' : ''} onclick="${onclick}">🪙 ${fmtCoin(price)}</button>
    ${short ? '<div class="sc-poor">코인 부족</div>' : ''}`;
}

/* ── borders tab ─────────────────────────────────────────────────── */

function borderPreview(id, size = 58) {
  return `
    <div class="sc-prev">
      <div class="avatar-frame${id ? ' border-' + esc(id) : ''}" style="--tier-color:#00e5aa;width:${size}px;height:${size}px">
        <div class="bp-inner">👤</div>
      </div>
    </div>`;
}

function borderCard(b) {
  const owned    = ownsBorder(b.id);
  const equipped = _user.selectedBorder === b.id;
  const rInfo    = RARITY_INFO[b.rarity] || RARITY_INFO.common;
  let btn;
  if (equipped) {
    btn = `<button class="sc-btn on" onclick="equipBorder('')">✓ 장착중</button>`;
  } else if (owned) {
    btn = `<button class="sc-btn equip" onclick="equipBorder('${esc(b.id)}')">장착</button>`;
  } else {
    btn = buyBtnHtml(`openBuyBorder('${esc(b.id)}')`, b.price);
  }
  const extra = b.rewardAch ? `<div class="sc-note">🏆 업적 달성 시 무료</div>` : '';
  return `
    <div class="shop-card ${equipped ? 'equipped' : ''}">
      ${borderPreview(b.id)}
      <div class="sc-name">${esc(b.name)}</div>
      <div class="sc-rarity" style="color:${rInfo.color}">${esc(rInfo.label)}</div>
      ${extra}${btn}
    </div>`;
}

function renderBordersTab() {
  let html = `<p style="font-size:11px;color:var(--muted);margin:0 0 10px">
    모든 테두리를 코인으로 구매할 수 있어요. 🏆 표시는 연결된 업적을 달성하면 무료로 열려요.</p>`;
  RARITY_ORDER.forEach(r => {
    const items = SHOP_BORDERS.filter(b => b.rarity === r);
    if (!items.length) return;
    const info = RARITY_INFO[r];
    html += `
      <div class="rarity-head" style="color:${info.color}">
        <span>◆ ${esc(info.label)}</span><span class="rh-line"></span>
        <span style="font-weight:600;opacity:.7">${fmtCoin(info.price)}코인</span>
      </div>
      <div class="shop-grid">${items.map(borderCard).join('')}</div>`;
  });
  return html;
}

/* ── titles tab ──────────────────────────────────────────────────── */

function titleRow(t, idx) {
  const owned    = t.kind === 'reward'
    ? (arr(_user.earnedTitles).includes(t.name) || ownsTitle(t.name))
    : ownsTitle(t.name);
  const equipped = _user.selectedTitle === t.name;
  let btn;
  if (equipped) {
    btn = `<button class="sc-btn on" onclick="equipTitleIdx(-1)">✓ 장착중</button>`;
  } else if (owned) {
    btn = `<button class="sc-btn equip" onclick="equipTitleIdx(${idx})">장착</button>`;
  } else {
    btn = buyBtnHtml(`openBuyTitle(${idx})`, t.price);
  }
  const desc = t.kind === 'reward' ? '🏆 업적 달성 시 무료' : esc(t.desc || '');
  return `
    <div class="title-row ${equipped ? 'equipped' : ''} ${t.kind === 'reward' ? 'reward' : ''}">
      <div class="tr-main">
        <span class="tr-badge">${esc(t.name)}</span>
        <div class="tr-desc">${desc}</div>
      </div>
      <div class="tr-btn-wrap">${btn}</div>
    </div>`;
}

function renderTitlesTab() {
  _titleRefs = [
    ...SHOP_TITLES.map(t => ({ ...t, kind: 'shop' })),
    ...REWARD_TITLES.map(n => ({ name: n, price: REWARD_TITLE_PRICE(n), kind: 'reward' })),
  ];
  const shopRows   = _titleRefs.map((t, i) => t.kind === 'shop'   ? titleRow(t, i) : '').join('');
  const rewardRows = _titleRefs.map((t, i) => t.kind === 'reward' ? titleRow(t, i) : '').join('');
  return `
    <div class="section-title">상점 칭호</div>
    ${shopRows}
    <div class="shop-section-gap"></div>
    <div class="section-title">🏆 업적 칭호</div>
    <p style="font-size:11px;color:var(--muted);margin:-4px 0 10px">업적을 달성하면 무료로 얻고, 코인으로 먼저 구매할 수도 있어요.</p>
    ${rewardRows}`;
}

function avatarPreview(item) {
  if (item.slot === 'body') return renderAvatarV2({ ...normalizeAvatarV2(_user.avatarV2), body:item.id }, { size:64, label:item.name });
  const icon = AVATAR_V2_CATEGORIES.find(c => c.id === item.slot)?.icon || '◇';
  return `<div style="font-size:30px;color:var(--teal)">${icon}</div>`;
}

function avatarCard(item) {
  const owned = ownedAvatarV2Item(_user,item) && !item.locked;
  const eligible = tierEligible(item);
  let button;
  if (owned) button = `<a class="sc-btn equip" href="dressroom.html?user=${uid}">드레스룸</a>`;
  else if (!eligible) button = `<button class="sc-btn lock" disabled>💠 다이아 이상</button>`;
  else if (item.locked) button = `<button class="sc-btn lock" disabled>준비 중</button>`;
  else button = buyBtnHtml(`openBuyAvatar('${esc(item.slot)}','${esc(item.id)}')`,item.price);
  return `<div class="shop-card ${owned?'equipped':''} ${eligible?'':'locked'}">
    <div class="sc-prev">${avatarPreview(item)}</div>
    <div class="sc-name">${esc(item.name)}</div>
    <div class="sc-note">${esc(item.note||'')}</div>
    ${item.minTier?'<div class="sc-rarity" style="color:#8da2ff">💠 다이아 이상</div>':''}
    ${button}</div>`;
}

function renderAvatarShopTab() {
  return AVATAR_V2_CATEGORIES.map(category => {
    const items=AVATAR_V2_ITEMS.filter(item=>item.slot===category.id&&item.price>0);
    if(!items.length)return '';
    return `<div class="rarity-head"><span>${category.icon} ${esc(category.name)}</span><span class="rh-line"></span><span>${items.length}개</span></div><div class="shop-grid">${items.map(avatarCard).join('')}</div>`;
  }).join('');
}

/* ── tab switching / main render ─────────────────────────────────── */

function renderTab() {
  const el = document.getElementById('tabContent');
  if (!el) return;
  el.innerHTML = curTab === 'borders' ? renderBordersTab() : curTab === 'titles' ? renderTitlesTab() : renderAvatarShopTab();
  document.querySelectorAll('.shop-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === curTab));
}

window.setTab = tab => { curTab = tab === 'avatar' ? 'borders' : tab; renderTab(); };

/* ── equip actions ───────────────────────────────────────────────── */

window.equipBorder = async id => {
  const v = id || null;
  try { await updateUser(uid, { selectedBorder: v }); }
  catch (e) { showToast('저장 실패: ' + e.message, 'err'); return; }
  _user.selectedBorder = v;
  setChip(_user, document.getElementById('chipName').style.color);
  renderTab();
  showToast(v ? '테두리 장착 완료 ✓' : '테두리 해제됨');
};

window.equipTitleIdx = async idx => {
  const v = idx < 0 ? null : (_titleRefs[idx]?.name ?? null);
  try { await updateUser(uid, { selectedTitle: v }); }
  catch (e) { showToast('저장 실패: ' + e.message, 'err'); return; }
  _user.selectedTitle = v;
  setChip(_user, document.getElementById('chipName').style.color);
  renderTab();
  showToast(v ? '칭호 장착 완료 ✓' : '칭호 해제됨');
};

/* ── purchase flow ───────────────────────────────────────────────── */

function openBuyModal(p, previewHtml) {
  if (coins < p.price) { showToast('코인이 부족해요 😢', 'err'); return; }
  pending = p;
  document.getElementById('buyPreview').innerHTML = previewHtml || '';
  document.getElementById('buyName').textContent  = p.name;
  document.getElementById('buyPrice').textContent = `🪙 ${fmtCoin(p.price)}`;
  document.getElementById('buyHave').textContent  = `🪙 ${fmtCoin(coins)}`;
  document.getElementById('buyAfter').textContent = `🪙 ${fmtCoin(coins - p.price)}`;
  document.getElementById('buyModal').classList.add('open');
}
window.closeBuy = () => { pending = null; document.getElementById('buyModal').classList.remove('open'); };
document.getElementById('buyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('buyModal')) window.closeBuy();
});

window.openBuyBorder = id => {
  const b = SHOP_BORDERS.find(x => x.id === id);
  if (!b || ownsBorder(id)) return;
  openBuyModal({ kind: 'border', id, name: b.name, price: b.price },
    `<div style="display:inline-block">${borderPreview(id, 64)}</div>`);
};
window.openBuyTitle = idx => {
  const t = _titleRefs[idx];
  if (!t || ownsTitle(t.name) || arr(_user.earnedTitles).includes(t.name)) return;
  openBuyModal({ kind: 'title', id: t.name, name: t.name, price: t.price },
    `<span class="tr-badge">${esc(t.name)}</span>`);
};
window.openBuyAvatar = (slot,id) => {
  const item=AVATAR_V2_ITEMS.find(candidate=>candidate.slot===slot&&String(candidate.id)===String(id));
  if(!item||ownedAvatarV2Item(_user,item)||!tierEligible(item)||item.locked)return;
  openBuyModal({kind:'avatar',id:`${slot}:${id}`,name:item.name,price:item.price},avatarPreview(item));
};
window.confirmBuy = async () => {
  if (!pending) return;
  const { kind, id, price } = pending;
  if (coins < price) { showToast('코인이 부족해요 😢', 'err'); window.closeBuy(); return; }

  const upd = { coins: coins - price };
  const pushUnique = (list, v) => { const a = [...arr(list)]; if (!a.includes(v)) a.push(v); return a; };
  if (kind === 'border') {
    upd.purchasedBorders = pushUnique(_user.purchasedBorders, id);
    upd.unlockedBorders  = pushUnique(_user.unlockedBorders, id);
  } else if (kind === 'title') {
    upd.purchasedTitles  = pushUnique(_user.purchasedTitles, id);
    upd.earnedTitles     = pushUnique(_user.earnedTitles, id);
  } else if (kind === 'avatar') {
    upd.avatarItemsV2 = pushUnique(_user.avatarItemsV2, id);
  } else {
    window.closeBuy();
    return;
  }

  const btn = document.getElementById('buyConfirmBtn');
  btn.disabled = true;
  try { await updateUser(uid, upd); }
  catch (e) { btn.disabled = false; showToast('구매 실패: ' + e.message, 'err'); return; }
  btn.disabled = false;

  const oldCoins = coins;
  Object.assign(_user, upd);
  coins = upd.coins;
  window.closeBuy();
  renderTab();
  animateCoins(oldCoins, coins);
  showToast('구매 완료! 🎉');
};

/* ── init ────────────────────────────────────────────────────────── */

async function init() {
  buildNav();

  const [user, tierData] = await Promise.all([
    getUser(uid),
    getTierSettings().catch(() => null),
  ]);
  if (!user) { localStorage.removeItem('uid'); location.href = 'index.html'; return; }
  if (user.passwordHash && !isAuthed(uid, user.passwordHash)) { location.href = 'index.html?select=1'; return; }

  _user = user;
  coins = Number.isFinite(user.coins) ? user.coins : 0;

  _tiers = tierData?.tiers || DEFAULT_TIERS;
  _tier  = getTierForScore(user.totalScore || 0, _tiers);
  setChip(user, _tier.color);
  document.title = `${user.name} 상점 | 마웨그`;

  document.getElementById('content').innerHTML = `
    <div class="wallet">
      <div class="wallet-amount">
        <span class="coin-ico" id="coinIco">🪙</span>
        <span id="coinAmt">0</span>
        <span class="coin-unit">코인</span>
      </div>
      <div class="wallet-hint">업적 달성 = 코인 적립 · 모든 아이템 구매 가능</div>
    </div>
    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="borders" onclick="setTab('borders')">🖼️ 테두리</button>
      <button class="shop-tab" data-tab="titles" onclick="setTab('titles')">🏷️ 칭호</button>
      <button class="shop-tab" data-tab="avatar" onclick="setTab('avatar')">⚔️ 아바타</button>
    </div>
    <div id="tabContent" class="mt-12"></div>`;

  requestAnimationFrame(() => {
    const el = document.getElementById('coinAmt');
    if (el) countTo(el, 0, coins, 900);
  });
  renderTab();
}

init().catch(e => {
  document.getElementById('content').innerHTML =
    `<div class="card"><p class="text-muted">오류: ${esc(e.message)}</p></div>`;
});
</script>
<script src="register-sw.js"></script>
</body>
</html>
