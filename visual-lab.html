<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시그니처 데모 · 마웨그</title><link rel="stylesheet" href="css/style.css"><style>body{background:#070b12;color:#eef5ff;margin:0;font-family:system-ui}.lab{max-width:1180px;margin:auto;padding:28px 16px}.lab h1{margin:0}.lab p{color:#92a1b5}.lab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.lab-card{position:relative;overflow:hidden;min-height:180px;border:1px solid #26364a;border-radius:14px;background:#101824;padding:12px}.lab-card h3{font-size:13px;margin:0 0 5px}.lab-card small{color:#7890a8}.lab-stage{position:relative;display:grid;place-items:center;height:125px;margin-top:6px;border-radius:10px;background:linear-gradient(#101d2b,#080d15)}.lab-stage .v2-profile{width:92px!important;height:92px!important}.lab-stage .v2-emoji-border{width:104px;height:104px}.lab-stage>.v2-ambient{inset:0}.lab-head{display:flex;justify-content:space-between;align-items:end;margin:26px 0 10px}.badge{font-size:11px;color:#00e5aa}</style></head><body><main class="lab"><h1>시그니처 데모</h1><p>인증과 Firebase 없이 실제 쇼룸 렌더러를 직접 비교합니다. 각 시퀀스는 3~5초간 한 번 재생한 뒤 완성 상태로 정지합니다.</p><div class="lab-head"><h2>이모티콘 테두리 10</h2><span class="badge">stable ID</span></div><section class="lab-grid" id="borders"></section><div class="lab-head"><h2>분위기 효과 10</h2><span class="badge">플롯 가독성 우선</span></div><section class="lab-grid" id="ambients"></section></main><script type="module">import{getCatalogItemV2,renderEmojiBorderV2,renderProfileEmojiV2,renderAmbientV2}from'./js/showroom-v2.js';const borderIds=['eb_astral_portal','eb_frost_spikes','eb_ember_chain','eb_arcane_orbit','eb_primordial_serpent','eb_abyss_tentacles','eb_clockwork_dial','eb_worldroot_arch','eb_drake_wings','eb_dawn_throne'],ambientIds=['ae_wind','ae_astral','ae_gold_sand','ae_void','ae_abyss','ae_thunder','ae_rune','ae_crystal','ae_dust','ae_dawn_blessing'];const card=(id,html)=>{const item=getCatalogItemV2(id);return`<article class="lab-card"><h3>${item?.name||id}</h3><small>${id}</small><div class="lab-stage">${html}</div></article>`};document.getElementById('borders').innerHTML=borderIds.map(id=>card(id,`<span class="v2-profile">${renderEmojiBorderV2(id,104)}${renderProfileEmojiV2(null,64)}</span>`)).join('');document.getElementById('ambients').innerHTML=ambientIds.map(id=>card(id,renderAmbientV2(id))).join('');</script></body></html>
