<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <title>그래프 모아보기 | 마웨그</title>
  <meta property="og:title" content="그래프 모아보기 | 마웨그">
  <meta property="og:description" content="여러 사용자의 체중 그래프를 한눈에 비교해 보세요.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://woojehong.github.io/myweightgraph/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/borders.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    @media(min-width:768px){ .page { max-width: 100% !important; padding-left: 8px !important; padding-right: 8px !important; } }

    /* ── 선택 바 ───────────────────────────────────────────────── */
    .compare-bar{
      position:sticky; top:0; z-index:90;
      background:var(--bg); padding:10px 0 8px;
      border-bottom:1px solid var(--border);
    }
    .picker{
      display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px;
      -webkit-overflow-scrolling:touch; scrollbar-width:thin;
    }
    .pick-chip{
      flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:transparent; border:none; padding:2px; position:relative; width:56px;
    }
    .pick-chip .pick-name{
      font-size:10px; color:var(--muted); max-width:54px; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap; text-align:center;
    }
    .pick-chip.sel .pick-name{ color:var(--teal); font-weight:700; }
    .pick-avatar{ width:42px; height:42px; opacity:.65; transition:opacity .15s; }
    .pick-chip.sel .pick-avatar{ opacity:1; }
    .pick-avatar-inner{
      width:34px; height:34px; border-radius:50%; background:#0d1117;
      display:flex; align-items:center; justify-content:center; font-size:18px;
      position:relative; z-index:1;
    }
    .pick-num{
      position:absolute; top:-2px; right:4px; z-index:5;
      width:18px; height:18px; border-radius:50%;
      background:var(--teal); color:#0d1117; font-size:11px; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 2px var(--bg);
    }

    /* ── 그래프 그리드 (열 수는 JS가 인원수에 맞춰 자동 설정) ───── */
    .compare-grid{ display:grid; gap:12px; margin-top:14px; grid-template-columns:1fr; }

    .cmp-cell{
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:10px 4px 6px; min-width:0;
    }
    .cmp-chart{ position:relative; width:100%; }
    .cmp-empty{
      display:flex; align-items:center; justify-content:center;
      min-height:120px; color:var(--muted); font-size:12px;
    }
    .grid-empty{
      grid-column:1/-1; text-align:center; color:var(--muted);
      font-size:13px; padding:48px 16px;
    }

    /* ── 미니 프로필 (데스크탑 기본) ───────────────────────────── */
    .cmp-profile{ display:flex; align-items:center; gap:9px; margin-bottom:8px; padding:0 6px; }
    .cmp-avatar{ width:32px; height:32px; flex-shrink:0; }
    .cmp-avatar-inner{
      width:26px; height:26px; border-radius:50%; background:#0d1117;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; position:relative; z-index:1;
    }
    .cmp-info{ display:flex; flex-direction:column; line-height:1.25; min-width:0; }
    .cmp-title{ font-size:9px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cmp-name{ font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cmp-score{ font-size:9px; color:var(--muted); }

    /* ── 모바일: 미니 프로필 2배 축소 (아이콘·텍스트 간격 확보) ── */
    @media(max-width:767px){
      .cmp-profile{ gap:8px; margin-bottom:6px; padding:0 6px; }
      .cmp-avatar{ width:18px; height:18px; }
      .cmp-avatar-inner{ width:14px; height:14px; font-size:9px; }
      .cmp-title{ font-size:7px; }
      .cmp-name{ font-size:9px; }
      .cmp-score{ font-size:7px; }
    }

    /* ── 모바일: 헤더 심플화 (프로필·미입력 숨김) ─────────────── */
    @media(max-width:767px){
      body.compare .top-bar{
        flex-direction:row !important; align-items:center !important;
        justify-content:space-between !important; padding:6px 14px !important; gap:8px;
      }
      body.compare .top-bar #todayAlert,
      body.compare .top-bar #userChip{ display:none !important; }
      body.compare .top-bar .mweg-header-wrap{
        order:0 !important; flex:1; align-items:flex-start !important; justify-self:unset !important;
      }
      body.compare .top-bar .mweg-title{ font-size:20px; }
      body.compare .top-bar .mweg-subtitle{ display:none; }
      body.compare .top-bar > div:last-child{
        order:0 !important; width:auto !important; justify-content:flex-end !important;
      }
      body.compare #logoutBtn{
        position:static !important; top:auto !important; right:auto !important;
        display:inline-block !important;
      }
    }
  </style>
</head>
<body class="compare">
<header class="top-bar">
  <div id="todayAlert" style="min-width:0"></div>
  <a href="index.html?select=1" class="mweg-header-wrap" style="justify-self:center"><span class="mweg-title">마웨그</span><span class="mweg-subtitle">My Weight Graph</span></a>
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <div class="user-chip" id="userChip" style="cursor:default">
      <div id="chipAvatarWrap" class="avatar-frame chip-avatar">
        <div class="chip-avatar-inner"><span id="chipEmoji">⚖️</span></div>
      </div>
      <div class="chip-info">
        <span id="chipTitle" class="chip-title"></span>
        <span id="chipName" class="chip-name">-</span>
        <span id="chipScore" class="chip-score"></span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="page">
  <div class="compare-bar">
    <div class="picker" id="picker">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="compare-grid" id="compareGrid"></div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<div class="toast" id="toast"></div>

<script type="module">
import { getUser, getUsers, getWeights, getSettings, getTierSettings } from './js/db.js';
import { isAuthed, clearAuth } from './js/auth.js';
import { renderChart } from './js/chart-render.js';
import { getTierForScore, DEFAULT_TIERS } from './js/achievements.js';

const uid = new URLSearchParams(location.search).get('user') || localStorage.getItem('uid');
if (!uid) location.href = 'index.html';

window.doLogout = () => { clearAuth(); localStorage.removeItem('uid'); location.href = 'index.html'; };

// ── 하단 네비 ─────────────────────────────────────────────────────────
function buildNav() {
  const links = [
    { href:`input.html?user=${uid}`,        icon:'✏️', label:'데이터 입력', id:'input' },
    { href:`dashboard.html?user=${uid}`,    icon:'📊', label:'내 그래프',   id:'dashboard' },
    { href:`compare.html?user=${uid}`,      icon:'👥', label:'모아보기',     id:'compare' },
    { href:`achievements.html?user=${uid}`, icon:'🏆', label:'업적',         id:'achievements' },
  ];
  const nav = document.getElementById('bottomNav');
  links.forEach(l => {
    const a = document.createElement('a');
    a.href = l.href; a.className = l.id === 'compare' ? 'active' : '';
    a.innerHTML = `<span class="icon">${l.icon}</span>${l.label}`;
    nav.appendChild(a);
  });
}

let allUsers = [], TIERS = DEFAULT_TIERS, S = {}, curUser = null;
let selected = [];       // 선택된 uid 배열 (표시 순서 유지)
const weightsCache = {}; // uid -> records

const STORAGE_KEY = 'compare_selected_uids';
function loadSelected() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : null;
  } catch (e) { return null; }
}
function saveSelected() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(selected)); } catch (e) {}
}

// 모아보기 차트 옵션: '내 그래프'와 동일하게 메인 + 주간막대 + 식단 + 운동 모두 표시.
// gridCell=true → 칸 너비에 맞춰 메인 그래프가 꽉 차도록 종횡비 계산.
function chartOpts() {
  return {
    ...S,
    showWeeklyBar: true,
    showDietGraph: true,
    showExerciseGraph: true,
    gridCell: true,
  };
}

// 선택 인원수에 따른 열 개수 자동 결정 (모바일 기준 2명까지 1열, 그 이상 2열)
function gridCols(n) {
  const desktop = window.matchMedia('(min-width:768px)').matches;
  if (desktop) return n <= 1 ? 1 : (n <= 4 ? 2 : 3);
  return n <= 2 ? 1 : 2;
}

function setChip(u) {
  const tier = getTierForScore(u?.totalScore || 0, TIERS);
  const tc = tier.color || '#00e5aa';
  document.getElementById('chipEmoji').textContent = u?.emoji || '⚖️';
  document.getElementById('chipName').textContent  = u?.name || '-';
  document.getElementById('chipName').style.color  = tc;
  const wrap = document.getElementById('chipAvatarWrap');
  wrap.className = `avatar-frame chip-avatar${u?.selectedBorder ? ' border-'+u.selectedBorder : ''}`;
  wrap.style.setProperty('--tier-color', tc);
  const titleEl = document.getElementById('chipTitle');
  titleEl.textContent = u?.selectedTitle || '';
  titleEl.style.color = tc;
  titleEl.style.display = u?.selectedTitle ? 'inline' : 'none';
  const scoreEl = document.getElementById('chipScore');
  scoreEl.textContent = (u?.totalScore > 0) ? `${u.totalScore} PT` : '';
}

// ── 유저 선택 피커 ────────────────────────────────────────────────────
function renderPicker() {
  const el = document.getElementById('picker');
  el.innerHTML = allUsers.map(u => {
    const tier = getTierForScore(u.totalScore || 0, TIERS);
    const tc = tier.color;
    const idx = selected.indexOf(u.id);
    const sel = idx >= 0;
    const bClass = u.selectedBorder ? ' border-' + u.selectedBorder : '';
    return `
      <button class="pick-chip ${sel ? 'sel' : ''}" data-id="${u.id}">
        ${sel ? `<span class="pick-num">${idx + 1}</span>` : ''}
        <div class="avatar-frame pick-avatar${bClass}" style="--tier-color:${tc}">
          <div class="pick-avatar-inner">${u.emoji || '⚖️'}</div>
        </div>
        <span class="pick-name">${u.name}</span>
      </button>`;
  }).join('');
  el.querySelectorAll('.pick-chip').forEach(btn => {
    btn.addEventListener('click', () => togglePick(btn.dataset.id));
  });
}

function togglePick(id) {
  const i = selected.indexOf(id);
  if (i >= 0) selected.splice(i, 1);
  else selected.push(id);
  saveSelected();
  renderPicker();
  renderGrid();
}

// ── 그래프 그리드 ─────────────────────────────────────────────────────
function destroyGridCharts() {
  document.querySelectorAll('#compareGrid canvas').forEach(c => {
    if (c._chartInstance) { try { c._chartInstance.destroy(); } catch (e) {} }
  });
}

function cellHTML(u) {
  const tier = getTierForScore(u.totalScore || 0, TIERS);
  const tc = tier.color;
  const bClass = u.selectedBorder ? ' border-' + u.selectedBorder : '';
  const recs = weightsCache[u.id] || [];
  const hasData = recs.filter(r => r.weight != null).length >= 2;
  const body = hasData
    ? `<div class="cmp-chart"><canvas id="cv_${u.id}"></canvas></div>`
    : `<div class="cmp-empty">데이터가 부족해요</div>`;
  return `
    <div class="cmp-cell">
      <div class="cmp-profile">
        <div class="avatar-frame cmp-avatar${bClass}" style="--tier-color:${tc}">
          <div class="cmp-avatar-inner">${u.emoji || '⚖️'}</div>
        </div>
        <div class="cmp-info">
          ${u.selectedTitle ? `<span class="cmp-title" style="color:${tc}">${u.selectedTitle}</span>` : ''}
          <span class="cmp-name" style="color:${tc}">${u.name}</span>
          ${u.totalScore > 0 ? `<span class="cmp-score">${u.totalScore} PT</span>` : ''}
        </div>
      </div>
      ${body}
    </div>`;
}

async function renderGrid() {
  const grid = document.getElementById('compareGrid');
  destroyGridCharts();

  if (!selected.length) {
    grid.style.gridTemplateColumns = '1fr';
    grid.innerHTML = `<div class="grid-empty">위에서 사용자를 선택하면<br>그래프를 한눈에 비교할 수 있어요.</div>`;
    return;
  }

  grid.style.gridTemplateColumns = `repeat(${gridCols(selected.length)}, 1fr)`;

  // 선택된 유저들의 기록 병렬 로드 (캐시)
  await Promise.all(selected.map(async id => {
    if (!weightsCache[id]) weightsCache[id] = await getWeights(id).catch(() => []);
  }));

  const users = selected.map(id => allUsers.find(u => u.id === id)).filter(Boolean);
  grid.innerHTML = users.map(cellHTML).join('');

  // 캔버스가 DOM에 들어간 뒤 차트 렌더
  const opts = chartOpts();
  users.forEach(u => {
    const cv = document.getElementById('cv_' + u.id);
    const recs = weightsCache[u.id] || [];
    if (cv && recs.filter(r => r.weight != null).length >= 2) {
      try { renderChart(recs, u, cv, null, opts); } catch (e) {}
    }
  });
}

// 창 크기 변경 시 종횡비 재계산 위해 재렌더 (디바운스)
let _rzT = null;
window.addEventListener('resize', () => {
  clearTimeout(_rzT);
  _rzT = setTimeout(renderGrid, 250);
});

// ── 토스트 ────────────────────────────────────────────────────────────
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2200);
}

// ── 초기화 ────────────────────────────────────────────────────────────
async function init() {
  buildNav();
  const [users, tierData, settings] = await Promise.all([
    getUsers(),
    getTierSettings().catch(() => null),
    getSettings(),
  ]);
  allUsers = users;
  TIERS = tierData?.tiers || DEFAULT_TIERS;
  S = settings;

  curUser = users.find(u => u.id === uid) || await getUser(uid);
  if (!curUser) { location.href = 'index.html'; return; }

  // 현재 세션 사용자 인증 체크 (다른 유저 그래프는 핀 불필요)
  if (curUser.passwordHash && !isAuthed(uid, curUser.passwordHash)) {
    location.href = `index.html?auth_required=${encodeURIComponent(uid)}`;
    return;
  }

  document.getElementById('logoutBtn').style.display = '';
  setChip(curUser);
  document.title = '그래프 모아보기 | 마웨그';

  // 선택 복원: 저장된 목록(존재하는 유저만) → 없으면 현재 사용자 기본 선택
  const ids = new Set(users.map(u => u.id));
  const saved = loadSelected();
  if (saved) {
    selected = saved.filter(id => ids.has(id));
  }
  if (!selected.length && ids.has(uid)) {
    selected = [uid];
  }
  saveSelected();

  renderPicker();
  renderGrid();
}

init().catch(e => {
  document.getElementById('compareGrid').innerHTML =
    `<div class="grid-empty">오류: ${e.message}</div>`;
});
</script>
<script src="register-sw.js"></script>
</body>
</html>
