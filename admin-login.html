<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | 마웨그</title>
  <meta property="og:title" content="관리자 로그인 | 마웨그">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0 28px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:all .15s;}
    .pin-dot.filled{background:var(--teal);border-color:var(--teal);}
    .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
    .pin-btn{padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
             color:var(--text);font-size:20px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
    .pin-btn:hover{background:rgba(0,229,170,.12);border-color:rgba(0,229,170,.3);}
    .pin-btn:active{transform:scale(.93);}
    .pin-btn.del{font-size:16px;color:var(--muted);}
    .pin-shake{animation:shake .3s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  </style>
</head>
<body>
<div class="landing">
  <h1>🔐 <span>관리자</span></h1>
  <p style="margin-bottom:4px">6자리 PIN을 입력하세요</p>

  <div style="width:100%;max-width:280px">
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>

    <div class="pin-pad">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>
      <button class="pin-btn" onclick="pinInput('8')">8</button>
      <button class="pin-btn" onclick="pinInput('9')">9</button>
      <button class="pin-btn" onclick="pinClear()" style="font-size:13px;color:var(--muted)">전체삭제</button>
      <button class="pin-btn" onclick="pinInput('0')">0</button>
      <button class="pin-btn del" onclick="pinDelete()">⌫</button>
    </div>

    <div style="margin-top:20px;text-align:center">
      <a href="index.html" style="font-size:12px;color:var(--muted)">← 메인으로</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { adminSignIn, onAuthChange, ADMIN_UID } from './js/db.js';

onAuthChange(user => {
  if (user && user.uid === ADMIN_UID) location.href = 'admin.html';
});

let pin = '';

window.pinInput = function(n) {
  if (pin.length >= 6) return;
  pin += n;
  updateDots();
  if (pin.length === 6) setTimeout(doLogin, 120);
};

window.pinDelete = function() {
  pin = pin.slice(0, -1);
  updateDots();
};

window.pinClear = function() {
  pin = '';
  updateDots();
};

function updateDots() {
  for (let i = 0; i < 6; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pin.length);
  }
}

// 키보드 지원
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') window.pinInput(e.key);
  else if (e.key === 'Backspace') window.pinDelete();
});

async function doLogin() {
  const email = 'admin@mygraph.pro';
  try {
    const cred = await adminSignIn(email, pin);
    if (cred.user.uid !== ADMIN_UID) {
      showError();
      return;
    }
    location.href = 'admin.html';
  } catch(e) {
    showError();
  }
}

function showError() {
  const dots = document.getElementById('pinDots');
  dots.classList.add('pin-shake');
  setTimeout(() => {
    dots.classList.remove('pin-shake');
    pin = '';
    updateDots();
  }, 350);
  showToast('PIN이 틀렸어요', 'err');
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
