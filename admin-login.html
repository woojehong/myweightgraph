<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | 마웨그</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="landing">
  <h1>🔐 <span>관리자</span></h1>
  <p>관리자 계정으로 로그인하세요</p>
  <div style="width:100%;max-width:320px">
    <input type="hidden" id="email" value="admin@mygraph.pro">
    <div class="input-group">
      <label class="input-label">비밀번호</label>
      <input class="input-field" id="password" type="password" placeholder="••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full mt-8" id="loginBtn" onclick="doLogin()">로그인</button>
    <div style="margin-top:12px;text-align:center">
      <a href="index.html" style="font-size:12px;color:var(--muted)">← 메인으로</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { adminSignIn, onAuthChange, ADMIN_UID } from './js/db.js';

// 이미 로그인된 경우 바로 이동
onAuthChange(user => {
  if (user && user.uid === ADMIN_UID) location.href = 'admin.html';
});

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  const btn   = document.getElementById('loginBtn');
  if (!pw) { showToast('비밀번호를 입력해주세요', 'err'); return; }
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    const cred = await adminSignIn(email, pw);
    if (cred.user.uid !== ADMIN_UID) {
      showToast('관리자 계정이 아닙니다', 'err');
      btn.disabled=false; btn.textContent='로그인'; return;
    }
    location.href = 'admin.html';
  } catch(e) {
    showToast('비밀번호가 틀렸어요', 'err');
    btn.disabled=false; btn.textContent='로그인';
  }
};

function showToast(msg, type='ok') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
