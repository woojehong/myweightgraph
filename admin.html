<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 마웨그</title>
  <meta property="og:title" content="관리자 | 마웨그">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    .admin-grid{display:grid;grid-template-columns:280px 1fr;gap:16px;}
    @media(max-width:767px){.admin-grid{grid-template-columns:1fr;}}
    .user-list-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .15s;}
    .user-list-item:hover,.user-list-item.active{background:rgba(0,229,170,.08);}
    .user-list-item .av{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .ord-col{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
    .ord-btn{width:20px;height:16px;line-height:1;padding:0;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .ord-btn:hover:not(:disabled){background:rgba(0,229,170,.12);border-color:var(--teal);color:var(--teal);}
    .ord-btn:disabled{opacity:.25;cursor:default;}
    .toggle-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .toggle-row:last-child{border-bottom:none;}
    .switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.15);border-radius:24px;transition:.3s;}
    .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
    input:checked+.slider{background:var(--teal);}
    input:checked+.slider:before{transform:translateX(18px);}
    .range-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
    input[type=range]{flex:1;accent-color:var(--teal);}
    .rec-table{width:100%;border-collapse:collapse;font-size:13px;}
    .rec-table th{text-align:left;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;}
    .rec-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
    .rec-table tr:last-child td{border-bottom:none;}
    .w-edit{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:13px;width:64px;text-align:right;padding:2px 4px;transition:border-color .2s;}
    .w-edit:focus{outline:none;border-bottom-color:var(--teal);background:rgba(0,229,170,.05);}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;}
    .del-btn:hover{color:var(--red);}
    .saved-flash{color:var(--teal);font-size:11px;animation:fadeout 1.5s forwards;}
    @keyframes fadeout{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
    .pw-dots{display:flex;gap:6px;}
    .pw-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);}
    .pw-dot.filled{background:var(--teal);border-color:var(--teal);}
    /* 탭 */
    .admin-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
    .admin-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;transition:all .15s;}
    .admin-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
    .admin-tab:hover{color:var(--text);}
    /* 데이터실 */
    .border-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:12px;}
    .border-demo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:default;}
    .border-demo{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;}
    .border-demo-name{font-size:11px;color:var(--muted);text-align:center;}
    .tier-table{width:100%;border-collapse:collapse;font-size:13px;}
    .tier-table th{text-align:left;padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;}
    .tier-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);}
    .tier-table tr:last-child td{border-bottom:none;}
    .tier-color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;}
    .adm-skin-tools{display:grid;grid-template-columns:1fr repeat(3,110px);gap:6px;margin-bottom:8px}.adm-skin-tools input,.adm-skin-tools select{min-width:0;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:11px}.adm-skin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;max-height:480px;overflow:auto}.adm-skin-row{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;padding:7px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);font-size:10px}.adm-skin-row b{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.adm-skin-row button{padding:4px 6px;border-radius:5px;font-size:9px}.adm-bulk{display:flex;gap:6px;margin-top:8px}@media(max-width:600px){.adm-skin-tools{grid-template-columns:1fr 1fr}.adm-skin-tools input{grid-column:1/-1}}
    .ach-admin-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;max-height:360px;overflow-y:auto;}
    /* 월별 아코디언 */
    .month-accordion{margin-bottom:4px;}
    .month-header{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;background:var(--surface2);cursor:pointer;user-select:none;font-size:12px;font-weight:700;color:var(--text);}
    .month-header:hover{background:rgba(0,229,170,.08);}
    .month-header .mh-meta{font-size:11px;font-weight:400;color:var(--muted);}
    .month-header .mh-arrow{font-size:10px;color:var(--muted);transition:transform .2s;}
    .month-header.open .mh-arrow{transform:rotate(180deg);}
    .month-body{display:none;}
    .month-body.open{display:block;}
    .empty-row td{color:rgba(255,255,255,.25);}
  </style>
  <link rel="stylesheet" href="css/borders.css">
</head>
<body>
<header class="top-bar" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px">
  <div></div>
  <div class="mweg-header-wrap" style="justify-self:center">
    <span class="mweg-title">마웨그 관리자</span>
    <span class="mweg-subtitle">Admin Dashboard</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
    <a href="index.html" class="btn btn-ghost btn-sm">메인</a>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="page" id="app">
  <div class="loading"><div class="spinner"></div> 인증 확인 중...</div>
</div>
<div class="page" id="dataroomPage" style="display:none"></div>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="delModal">
  <div class="modal">
    <h3>⚠️ 사용자 삭제</h3>
    <p style="font-size:14px;color:var(--muted);margin:10px 0 16px"><b id="delName"></b>의 모든 데이터가 삭제됩니다.</p>
    <div class="flex-row gap-8">
      <button class="btn btn-ghost btn-full" onclick="document.getElementById('delModal').classList.remove('open')">취소</button>
      <button class="btn btn-danger btn-full" id="delConfirmBtn">삭제</button>
    </div>
  </div>
</div>

<script type="module">
import { onAuthChange, adminSignOut, ADMIN_UID,
         getUsers, getUser, updateUser, deleteUser,
         getWeights, setWeight, deleteWeight, setDietExercise,
         batchMergeWeights, toDateStr, saveUserOrder,
         getSettings, updateGlobalSettings,
         setUserPassword, parseWeight,
         getEarnedAchievements,
         getTierSettings, saveTierSettings,
         saveAdminOverride, adminSetCatalogOwnershipV2 } from './js/db.js';
import { ACHIEVEMENTS, ACHIEVEMENT_CATEGORIES, DEFAULT_TIERS } from './js/achievements.js';
import { computeAchievementState, syncAchievements } from './js/achievements-engine.js';
import { ALL_CATALOG_V2, V2_CATEGORIES, CATEGORY_META, RARITY_META, ownedItemIdsV2, profileVisualForUserV2, titleInfoV2 } from './js/showroom-v2.js?v=82';

let allUsers=[], selectedUid=null, settings={};

onAuthChange(async user => {
  if (!user || user.uid !== ADMIN_UID) { location.href='admin-login.html'; return; }
  await init();
});
window.doLogout = async () => { await adminSignOut(); location.href='admin-login.html'; };

let tierSettings = null;

async function init() {
  [allUsers, settings, tierSettings] = await Promise.all([getUsers(), getSettings(), getTierSettings()]);
  if (!tierSettings) tierSettings = { tiers: DEFAULT_TIERS };
  // 저장된 tiers에 새 티어(에메랄드 등) 자동 머지
  if (tierSettings.tiers) {
    const sm = Object.fromEntries(tierSettings.tiers.map(t => [t.id, t]));
    tierSettings.tiers = DEFAULT_TIERS.map(dt => ({
      ...dt,
      minScore: sm[dt.id]?.minScore ?? dt.minScore,
      color:    sm[dt.id]?.color    ?? dt.color,
    }));
  }
  renderTabBar();
  renderApp();
}

function renderTabBar() {
  const tabBar = document.createElement('div');
  tabBar.className = 'admin-tabs';
  tabBar.id = 'adminTabBar';
  tabBar.innerHTML = `
    <button class="admin-tab active" onclick="switchTab('users')">👥 사용자 관리</button>
    <button class="admin-tab" onclick="switchTab('dataroom')">🗃️ 데이터실</button>`;
  document.getElementById('app').before(tabBar);
}

window.switchTab = tab => {
  document.querySelectorAll('.admin-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='users')||(i===1&&tab==='dataroom')));
  document.getElementById('app').style.display = tab === 'users' ? '' : 'none';
  document.getElementById('dataroomPage').style.display = tab === 'dataroom' ? '' : 'none';
  if (tab === 'dataroom') renderDataroom();
};

function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="admin-grid">
      <div>
        <div class="card">
          <div class="section-title">👥 사용자</div>
          <div id="userList"></div>
        </div>
        <div class="card mt-12">
          <div class="section-title">💰 코인 일괄 정산</div>
          <p style="font-size:11px;color:var(--muted);margin-bottom:8px">
            전 계정의 업적을 재판정하고, 코인 미지급 계정에 기달성 점수만큼 코인을 소급 지급합니다.
            (신규 달성 업적 저장·보상 해금·랭킹 점수 갱신 포함)
          </p>
          <button class="btn btn-primary btn-sm btn-full" id="settleBtn" onclick="settleAllCoins()">전 계정 정산 실행</button>
          <div id="settleLog" style="font-size:11px;color:var(--muted);margin-top:8px;max-height:140px;overflow-y:auto"></div>
        </div>
        <div class="card mt-12">
          <div class="section-title">⚙️ 기능 설정</div>
          <div id="featurePanel"></div>
        </div>
      </div>
      <div id="userDetail">
        <div class="card" style="padding:40px;text-align:center;color:var(--muted)">왼쪽에서 사용자를 선택하세요</div>
      </div>
    </div>`;
  renderUserList();
  renderFeaturePanel();
}

function renderUserList() {
  const el = document.getElementById('userList');
  if (!allUsers.length) { el.innerHTML='<p class="text-muted" style="padding:10px 0;font-size:13px">사용자 없음</p>'; return; }
  const last = allUsers.length - 1;
  el.innerHTML = `<div style="font-size:11px;color:var(--muted);padding:2px 2px 8px">▲▼로 순서를 바꾸면 로그인·우리 그래프 등 모든 목록에 적용됩니다.</div>` +
    allUsers.map((u, idx) => `
    <div class="user-list-item ${u.id===selectedUid?'active':''}" onclick="selectUser('${u.id}')">
      <div class="ord-col">
        <button class="ord-btn" ${idx===0?'disabled':''} onclick="event.stopPropagation();moveUser('${u.id}',-1)">▲</button>
        <button class="ord-btn" ${idx===last?'disabled':''} onclick="event.stopPropagation();moveUser('${u.id}',1)">▼</button>
      </div>
      <div class="av">${profileVisualForUserV2(u,38)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px">${u.name}</div>
        <div style="font-size:11px;color:var(--muted)">${[u.goal?`목표 ${u.goal}kg`:'',u.height?`${u.height}cm`:'',u.birthYear?`${u.birthYear}년생`:''].filter(Boolean).join(' · ')}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();confirmDelete('${u.id}','${u.name}')">✕</button>
    </div>`).join('');
}

// ── 코인 일괄 정산: 전 계정 업적 재판정 + 소급 코인 지급 ─────────────
window.settleAllCoins = async () => {
  const btn = document.getElementById('settleBtn');
  const log = document.getElementById('settleLog');
  if (!btn || btn.disabled) return;
  btn.disabled = true; btn.textContent = '정산 중...';
  log.innerHTML = '';
  let done = 0, failed = 0;
  for (const u of allUsers) {
    try {
      const before = u.coins;
      const res = await syncAchievements(u.id);
      if (res) {
        const after = res.user.coins ?? 0;
        const granted = before == null ? after : (res.coinsGained || 0);
        const newAch = res.newAchievements.length;
        log.innerHTML += `<div>✓ ${u.name} — 코인 ${after} (${before == null ? `소급 +${granted}` : granted > 0 ? `+${granted}` : '변동 없음'}${newAch ? ` · 신규 업적 ${newAch}개` : ''})</div>`;
        u.coins = after;
        u.totalScore = res.user.totalScore;
        done++;
      }
    } catch (e) {
      log.innerHTML += `<div style="color:var(--red)">✗ ${u.name} — ${e.message}</div>`;
      failed++;
    }
    log.scrollTop = log.scrollHeight;
  }
  btn.disabled = false; btn.textContent = '전 계정 정산 실행';
  showToast(`정산 완료: ${done}명 성공${failed ? `, ${failed}명 실패` : ''}`, failed ? 'err' : 'ok');
};

window.moveUser = async (id, dir) => {
  const i = allUsers.findIndex(u => u.id === id);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= allUsers.length) return;
  [allUsers[i], allUsers[j]] = [allUsers[j], allUsers[i]];
  allUsers.forEach((u, k) => { u.sortOrder = k; });
  renderUserList();
  try { await saveUserOrder(allUsers.map(u => u.id)); showToast('순서 저장됨 ✓', 'ok'); }
  catch (e) { showToast('오류: ' + e.message, 'err'); }
};

// ── 기능 토글 ─────────────────────────────────────────────────────────
const FEATURE_GROUPS = [
  { title:'📈 그래프', items:[
    {key:'show7dayMA',label:'7일 이동평균',desc:''},
    {key:'showWeeklyBar',label:'주간 막대',desc:''},
    {key:'showPrediction',label:'예상 그래프',desc:'기본 미체크'},
  ]},
  { title:'💬 말풍선', items:[
    {key:'showMaxMarker',label:'최고 체중',desc:''},
    {key:'showMinMarker',label:'최저 체중',desc:''},
    {key:'showCurMarker',label:'현재 체중',desc:''},
  ]},
  { title:'📋 스탯 카드', items:[
    {key:'showStatPeriod',label:'기간',desc:''},{key:'showStatStart',label:'시작 체중',desc:''},
    {key:'showStatCurrent',label:'현재 체중',desc:''},{key:'showStatLoss',label:'총 감량',desc:''},
    {key:'showStatRatio',label:'감량 비율',desc:''},{key:'showStatDaily',label:'일 평균',desc:''},
    {key:'showStatWeekly',label:'주 평균',desc:''},{key:'showStatGoal',label:'목표까지',desc:''},
    {key:'showStatETA',label:'달성 예상일',desc:''},{key:'showStatBMI',label:'BMI',desc:'키 필요'},
    {key:'showStatStreak',label:'연속 감량',desc:'주 단위'},
  ]},
];
function isOn(key) {
  if (key==='showPrediction') return !!settings[key];
  return settings[key]!==false;
}
function renderFeaturePanel() {
  let html='';
  FEATURE_GROUPS.forEach(g=>{
    html+=`<div class="toggle-section-title">${g.title}</div>`;
    g.items.forEach(f=>{
      html+=`<div class="toggle-row">
        <div><div style="font-size:13px">${f.label}</div>${f.desc?`<div style="font-size:11px;color:var(--muted)">${f.desc}</div>`:''}</div>
        <label class="switch"><input type="checkbox" ${isOn(f.key)?'checked':''}
          onchange="onToggle('${f.key}',this.checked)"><span class="slider"></span></label>
      </div>`;
    });
  });
  const opVal=Math.round((settings.annotOpacity??0.88)*100);
  html+=`<div class="toggle-section-title">🎨 말풍선 투명도</div>
    <div class="range-row">
      <input type="range" id="opR" min="0" max="100" value="${opVal}" oninput="onOp(this.value)">
      <span id="opV" style="font-size:13px;width:36px;text-align:right">${opVal}%</span>
    </div>`;
  document.getElementById('featurePanel').innerHTML=html;
}
window.onToggle=async(key,val)=>{settings[key]=val;await updateGlobalSettings({[key]:val});showToast('전역 기본값 저장됨','ok');};
window.onOp=async val=>{document.getElementById('opV').textContent=val+'%';await updateGlobalSettings({annotOpacity:val/100});};

// ── 사용자 상세 ───────────────────────────────────────────────────────
window.selectUser = async uid => {
  selectedUid=uid; renderUserList();
  document.getElementById('userDetail').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const [user,records,earnedRaw]=await Promise.all([getUser(uid),getWeights(uid),getEarnedAchievements(uid).catch(()=>[])]);
  // allUsers에서 adminOverrides 최신화
  const idx = allUsers.findIndex(u=>u.id===uid);
  const merged = {...(allUsers[idx]||{}), ...user};
  if(idx>=0) allUsers[idx]=merged;
  // 시스템 달성 여부 계산 — 공용 엔진 (오버라이드 제외한 순수 시스템 판정)
  const state = computeAchievementState({
    user: { ...merged, adminOverrides: {} },
    records,
    storedRaw: earnedRaw,
    tierData: tierSettings,
  });
  renderDetail(merged, records, state.validEarned);
};

function fmtTs(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let _detailRecords = [];

let _systemEarned = new Set();
function renderDetail(user, records, systemEarned=new Set()) {
  _systemEarned = systemEarned;
  _detailRecords = records;
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('userDetail').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        <div>
          <div style="font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px">${profileVisualForUserV2(user,38)} ${user.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            ${[user.height?`${user.height}cm`:'',user.birthYear?`${user.birthYear}년생`:'',`목표 ${user.goal||80}kg`].filter(Boolean).join(' · ')}
            ${titleInfoV2(user.showroomLoadoutV2)?`· 🏷️ <span style="color:${titleInfoV2(user.showroomLoadoutV2).color}">${titleInfoV2(user.showroomLoadoutV2).name}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="window.open('dashboard.html?user=${user.id}&admin_view=1','_blank')">📊 그래프 보기</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditUser('${user.id}')">✏️ 수정</button>

function buildRecordsAccordion(uid, records) {
  const recMap = {};
  records.forEach(r => { recMap[r.date] = r; });
  const toDs = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayDs = toDs(new Date());
  const allDates = [];
  if (records.length > 0) {
    const minDate = [...records].sort((a,b)=>a.date.localeCompare(b.date))[0].date;
    let cur = new Date(minDate + 'T00:00:00');
    const end = new Date(todayDs + 'T00:00:00');
    while (cur <= end) { allDates.push(toDs(cur)); cur.setDate(cur.getDate()+1); }
  }
  const monthMap = {};
  allDates.forEach(ds => {
    const ym = ds.slice(0,7);
    if (!monthMap[ym]) monthMap[ym] = [];
    monthMap[ym].push(ds);
  });
  const months = Object.keys(monthMap).sort((a,b)=>b.localeCompare(a));
  const curYM = todayDs.slice(0,7);
  const thead = `<table class="rec-table"><thead><tr>
    <th>날짜</th><th>체중</th><th style="width:20px"></th>
    <th>식단 (아·점·저)</th><th>운동</th><th></th>
  </tr></thead>`;
  return months.map(ym => {
    const [y, m] = ym.split('-');
    const label = `${y}년 ${parseInt(m)}월`;
    const days = monthMap[ym];
    const recordedCount = days.filter(d => recMap[d]?.weight != null).length;
    const isOpen = ym === curYM;
    const rows = days.slice().reverse().map(ds => recRow(uid, recMap[ds] || { date: ds })).join('');
    return `<div class="month-accordion">
      <div class="month-header${isOpen?' open':''}" onclick="toggleMonth(this)">
        <span>${label} <span class="mh-meta">(${recordedCount}일 기록)</span></span>
        <span class="mh-arrow">▼</span>
      </div>
      <div class="month-body${isOpen?' open':''}">
        ${thead}<tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }).join('');
}

window.toggleMonth = el => {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
};

function impParseDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (!s || s === '-') return null;
  if (/^\d{5}$/.test(s)) return toDateStr(new Date((parseInt(s)-25569)*86400000));
  const cleaned = s.replace(/[./년월]/g,'-').replace(/일/g,'').replace(/\s+/g,'');
  const patterns = [/^(\d{4})-(\d{1,2})-(\d{1,2})$/, /^(\d{2})-(\d{1,2})-(\d{1,2})$/, /^(\d{1,2})-(\d{1,2})$/];
  for (const p of patterns) {
    const m = cleaned.match(p);
    if (m) {
      let y, mo, d;
      if (m.length === 4) { y = m[1].length === 2 ? 2000+parseInt(m[1]) : parseInt(m[1]); mo = parseInt(m[2]); d = parseInt(m[3]); }
      else { y = new Date().getFullYear(); mo = parseInt(m[1]); d = parseInt(m[2]); }
      if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
      return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : toDateStr(d);
}

function impParseRows(rows) {
  const out = [];
  for (const row of rows) {
    if (!row || row.length < 2) continue;
    let dv = null, wv = null;
    for (let i = 0; i < row.length; i++) {
      const cell = String(row[i]).trim();
      if (!dv) { const d = impParseDate(cell); if (d) { dv = d; continue; } }
      if (!wv && dv) { const w = parseWeight(cell); if (w !== null) { wv = w; break; } }
    }
    if (!dv) continue;
    out.push({ date: dv, weight: wv, ok: wv !== null });
  }
  return out;
}

function impShowPreview(records) {
  _impRecords = records.filter(r => r.ok);

}

  if (!text) { showToast('붙여넣을 데이터가 없어요', 'err'); return; }
  impShowPreview(impParseRows(text.split('\n').map(l => l.split(/\t|,/))));
};

window.impHandleFile = e => {
  const file = e.target.files[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { showToast('파일 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요', 'err'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type:'array', cellDates:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, dateNF:'YYYY-MM-DD' });
      impShowPreview(impParseRows(raw.filter(r => r.some(c => c))));
    } catch (err) { showToast('파일 파싱 오류: ' + err.message, 'err'); }
  };
  reader.readAsArrayBuffer(file);
};

window.impDoImport = async () => {
  if (!_impUid || !_impRecords.length) { showToast('가져올 데이터가 없어요', 'err'); return; }
  const btn = document.getElementById('impBtn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  try {
    await batchMergeWeights(_impUid, _impRecords.map(r => ({ date: r.date, weight: r.weight })));
    showToast(`${_impRecords.length}개 가져오기 완료 ✓`, 'ok');
    rmModal();
    selectUser(_impUid);
  } catch (e) {
    showToast('오류: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '가져오기'; }
  }
};

window.setAchOverride = async (uid, achId, state) => {
  const user = allUsers.find(u => u.id === uid);
  if (!user) return;
  if (!user.adminOverrides) user.adminOverrides = {};

  const prevDate = user.adminOverrides[achId]?.earnedAt || null;
  if (state === 'auto') {
    delete user.adminOverrides[achId];
    await saveAdminOverride(uid, achId, null, null);
  } else {
    user.adminOverrides[achId] = { override: state, earnedAt: state==='earned' ? (prevDate||null) : null };
    await saveAdminOverride(uid, achId, state, state==='earned' ? (prevDate||null) : null);
  }
  // 해당 행만 재렌더
  const row = document.getElementById(`ovrow-${uid}-${achId}`);
  const ach = ACHIEVEMENTS.find(a => a.id === achId);
  if (row && ach) row.outerHTML = achOverrideRow(uid, ach, user.adminOverrides[achId]);
  showToast('저장됨', 'ok');
};

window.saveAchOverrideDate = async (uid, achId, dateStr) => {
  const user = allUsers.find(u => u.id === uid);
  if (!user || !user.adminOverrides?.[achId]) return;
  user.adminOverrides[achId].earnedAt = dateStr || null;
  await saveAdminOverride(uid, achId, 'earned', dateStr || null);
  showToast('날짜 저장됨', 'ok');
};

              <div class="border-demo">😊</div>
            </div>
            ${b.noTierColor?`<span style="position:absolute;top:-5px;right:-5px;font-size:8px;background:rgba(239,83,80,.15);border:1px solid rgba(239,83,80,.35);border-radius:3px;padding:1px 3px;color:#ef5350;white-space:nowrap;line-height:1.3">컬러 반영X</span>`:''}
          </div>
          <div class="border-demo-name">${b.name}</div>
          <div style="font-size:9px;text-align:center;margin-top:3px;color:${linkedAch?'var(--teal)':'var(--muted)'}">
            ${linkedAch?`🎖️ ${linkedAch.name}`:'미배정'}
          </div>
        </div>`}).join('')}
    </div>`;

  // 칭호 관리
  const titleContent = `
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <input class="input-field" id="newTitleName" placeholder="칭호 이름" style="flex:1;min-width:140px">
      <button class="btn btn-primary btn-sm" onclick="addTitle()">추가</button>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">업적 연결은 <b>업적별 보상</b> 섹션에서 설정하세요.</p>
    <div id="titleListEl">${renderTitleList()}</div>`;

  document.getElementById('dataroomPage').innerHTML =
    collapsibleSection('tier',      '🏅 티어 관리',      tierContent) +
    collapsibleSection('border',    '🖼️ 테두리 관리',   borderContent) +
    collapsibleSection('title',     '🏷️ 칭호 관리',    titleContent) +
    collapsibleSection('achreward', '🎖️ 업적별 보상',   buildAchRewardContent());
}

function achRewardRow(a) {
  const curBorder = Object.entries(borderAssign).find(([,aId]) => aId === a.id)?.[0] || '';
  const curTitle  = titleList.find(t => t.achId === a.id)?.id || '';
  const curTrophy = (achievementTrophyRewards[a.id] || [])[0] || '';
  const trophies = ALL_CATALOG_V2.filter(item=>item.category==='trophy');
  return `
    <div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <span style="font-size:16px;flex-shrink:0;margin-top:2px">${a.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;line-height:1.3">
          ${a.name}${a.legendary?' <span style="font-size:9px;color:#FFD700;font-weight:800">★ 위업</span>':''}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4">${a.desc}</div>
      </div>
      <select class="input-field" style="padding:3px 5px;font-size:10px;width:130px;flex-shrink:0;margin-top:2px"
        data-ach-border="${a.id}" onchange="saveAchBorder(this)">
        <option value="">테두리 없음</option>
        ${BORDER_LIST.map(b=>`<option value="${b.id}" ${curBorder===b.id?'selected':''}>${b.name}</option>`).join('')}
      </select>
      <select class="input-field" style="padding:3px 5px;font-size:10px;width:110px;flex-shrink:0;margin-top:2px"
        data-ach-title="${a.id}" onchange="saveAchTitle(this)">
        <option value="">칭호 없음</option>
        ${titleList.map(t=>`<option value="${t.id}" ${curTitle===t.id?'selected':''}>${t.name}</option>`).join('')}
      </select>
      <select class="input-field" style="padding:3px 5px;font-size:10px;width:145px;flex-shrink:0;margin-top:2px"
        data-ach-trophy="${a.id}" onchange="saveAchTrophy(this)">
        <option value="">트로피 없음</option>
        ${trophies.map(t=>`<option value="${t.id}" ${curTrophy===t.id?'selected':''}>🏆 ${t.name}</option>`).join('')}
      </select>
    </div>`;
}

function subCollapsible(id, label, content, accent) {
  const color = accent || 'rgba(255,255,255,.07)';
  return `
    <div style="border:1px solid ${color};border-radius:8px;margin-bottom:6px;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:rgba(255,255,255,.025)"
           onclick="toggleCatDR('${id}')">
        <span style="font-size:12px;font-weight:700;color:var(--text)">${label}</span>
        <span id="dr-arrow-${id}" style="color:var(--muted);font-size:11px">▼</span>
      </div>
      <div id="dr-body-${id}" style="display:none;padding:0 12px 8px">${content}</div>
    </div>`;
}

function buildAchRewardContent() {
  let html = `<p style="font-size:12px;color:var(--muted);margin-bottom:12px">각 업적에 테두리·칭호 보상을 배정하세요. 달성 시 자동 잠금해제됩니다.</p>`;

  // ── 위업 한눈에 보기 ────────────────────────────────────────────────
  const legendaryAchs = ACHIEVEMENTS.filter(a => a.legendary);
  let legHtml = `<p style="font-size:11px;color:var(--muted);margin:6px 0 4px">전체 카테고리의 위업만 모아서 보는 뷰예요. 보상 설정은 여기서도 가능해요.</p>`;
  legendaryAchs.forEach(a => { legHtml += achRewardRow(a); });
  html += subCollapsible('achleg', '⭐ 위업 한눈에 보기', legHtml, 'rgba(255,215,0,.25)');

  // ── 카테고리별 ─────────────────────────────────────────────────────
  ACHIEVEMENT_CATEGORIES.forEach(cat => {
    const catAchs = ACHIEVEMENTS.filter(a => a.cat === cat.id);
    if (!catAchs.length) return;
    let catHtml = '';
    catAchs.forEach(a => { catHtml += achRewardRow(a); });
    html += subCollapsible(`achcat-${cat.id}`, `${cat.icon} ${cat.label} (${catAchs.length})`, catHtml);
  });

  return html;
}

window.saveAchBorder = async sel => {
  const achId = sel.dataset.achBorder, newBorderId = sel.value;
  Object.keys(borderAssign).forEach(bId => { if (borderAssign[bId] === achId) delete borderAssign[bId]; });
  if (newBorderId) borderAssign[newBorderId] = achId;
  await saveDrSettings(); showToast('테두리 보상 저장됨','ok');
};
window.saveAchTitle = async sel => {
  const achId = sel.dataset.achTitle, newTitleId = sel.value;
  titleList.forEach(t => { if (t.achId === achId) t.achId = null; });
  if (newTitleId) { const t = titleList.find(x => x.id === newTitleId); if (t) t.achId = achId; }
  await saveDrSettings(); showToast('칭호 보상 저장됨','ok');
};
window.saveAchTrophy = async sel => {
  const achId=sel.dataset.achTrophy,trophyId=sel.value;
  if(trophyId)achievementTrophyRewards[achId]=[trophyId];else delete achievementTrophyRewards[achId];
  await saveDrSettings();showToast('트로피 보상 저장됨','ok');
};

function renderTitleList() {
  if (!titleList.length) return '<p style="font-size:12px;color:var(--muted)">칭호가 없어요. 위에서 추가하세요.</p>';
  return titleList.map((t,i) => {
    const linkedAch = t.achId ? ACHIEVEMENTS.find(a=>a.id===t.achId) : null;
    return `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <input class="input-field" style="flex:1;padding:4px 8px;font-size:12px" value="${t.name}"
        onblur="updateTitleName(${i},this.value)">
      <div style="font-size:10px;min-width:130px;flex-shrink:0;color:${linkedAch?'var(--teal)':'var(--muted)'}">
        ${linkedAch?`🎖️ ${linkedAch.name}`:'업적 미배정'}
      </div>
      <button class="del-btn" onclick="removeTitle(${i})">✕</button>
    </div>`;
  }).join('');
}

window.addTitle = async () => {
  const name = document.getElementById('newTitleName').value.trim();
  if (!name) { showToast('칭호 이름을 입력해주세요','err'); return; }
  titleList.push({ id: Date.now().toString(36), name, achId: null });
  await saveDrSettings();
  document.getElementById('titleListEl').innerHTML = renderTitleList();
  document.getElementById('newTitleName').value = '';
  showToast('칭호 추가됨','ok');
};
window.removeTitle = async i => {
  titleList.splice(i,1);
  await saveDrSettings();
  document.getElementById('titleListEl').innerHTML = renderTitleList();
  showToast('칭호 삭제됨','ok');
};
window.updateTitleName = async (i,v) => { titleList[i].name=v; await saveDrSettings(); };

async function saveDrSettings() {
  await saveTierSettings({ titles: titleList, borderAssign, achievementTrophyRewards });
  tierSettings = { ...tierSettings, titles: titleList, borderAssign, achievementTrophyRewards };
}

window.updateTierColor = (input) => {
  const id = input.dataset.tier;
  const el = document.getElementById(`tc-${id}`);
  if(el){el.textContent=input.value;el.style.color=input.value;}
};

window.saveTiers = async () => {
  const tiers = (tierSettings?.tiers || DEFAULT_TIERS).map(t => {
    const scoreEl = document.querySelector(`input[data-tier="${t.id}"][data-field="minScore"]`);
    const colorEl = document.querySelector(`input[data-tier="${t.id}"][data-field="color"]`);
    return { ...t,
      minScore: scoreEl ? parseInt(scoreEl.value)||0 : t.minScore,
      color:    colorEl ? colorEl.value              : t.color,
    };
  });
  await saveTierSettings({ tiers });
  tierSettings = { ...tierSettings, tiers };
  showToast('티어 설정 저장됨 ✓', 'ok');
};

// ── 모달 헬퍼 ─────────────────────────────────────────────────────────
function addModal(html){
  document.getElementById('delModal').insertAdjacentHTML('beforebegin',
    `<div class="modal-bg open" id="dynModal"><div class="modal">${html}</div></div>`);
  document.getElementById('dynModal').addEventListener('click', e=>{
    if(e.target===document.getElementById('dynModal')) rmModal();
  });
}
window.rmModal=()=>document.getElementById('dynModal')?.remove();

document.getElementById('delModal').addEventListener('click', e=>{
  if(e.target===document.getElementById('delModal'))
    document.getElementById('delModal').classList.remove('open');
});

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',2000);
}
</script>
</body>
</html>
