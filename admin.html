<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 마웨그</title>
  <meta property="og:title" content="관리자 | 마웨그">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-grid{display:grid;grid-template-columns:280px 1fr;gap:16px;}
    @media(max-width:767px){.admin-grid{grid-template-columns:1fr;}}
    .user-list-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .15s;}
    .user-list-item:hover,.user-list-item.active{background:rgba(0,229,170,.08);}
    .user-list-item .av{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .toggle-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .toggle-row:last-child{border-bottom:none;}
    .switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.15);border-radius:24px;transition:.3s;}
    .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
    input:checked+.slider{background:var(--teal);}
    input:checked+.slider:before{transform:translateX(18px);}
    .range-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
    input[type=range]{flex:1;accent-color:var(--teal);}
    .rec-table{width:100%;border-collapse:collapse;font-size:13px;}
    .rec-table th{text-align:left;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;}
    .rec-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
    .rec-table tr:last-child td{border-bottom:none;}
    .w-edit{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:13px;width:64px;text-align:right;padding:2px 4px;transition:border-color .2s;}
    .w-edit:focus{outline:none;border-bottom-color:var(--teal);background:rgba(0,229,170,.05);}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 6px;}
    .del-btn:hover{color:var(--red);}
    .saved-flash{color:var(--teal);font-size:11px;animation:fadeout 1.5s forwards;}
    @keyframes fadeout{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
    .pw-dots{display:flex;gap:6px;}
    .pw-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);}
    .pw-dot.filled{background:var(--teal);border-color:var(--teal);}
    /* 탭 */
    .admin-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
    .admin-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;transition:all .15s;}
    .admin-tab.active{color:var(--teal);border-bottom-color:var(--teal);}
    .admin-tab:hover{color:var(--text);}
    /* 데이터실 */
    .border-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-top:12px;}
    .border-demo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:default;}
    .border-demo{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;}
    .border-demo-name{font-size:11px;color:var(--muted);text-align:center;}
    .tier-table{width:100%;border-collapse:collapse;font-size:13px;}
    .tier-table th{text-align:left;padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;}
    .tier-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);}
    .tier-table tr:last-child td{border-bottom:none;}
    .tier-color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.15);cursor:pointer;}
    .ach-admin-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;max-height:360px;overflow-y:auto;}
    .ach-admin-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;background:var(--surface2);font-size:12px;}
    .ach-admin-row.invalidated{opacity:.45;}
    .ach-admin-row .ar-icon{font-size:16px;flex-shrink:0;}
    .ach-admin-row .ar-info{flex:1;min-width:0;}
    .ach-admin-row .ar-date{font-size:10px;color:var(--muted);}
    .invalid-btn{font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.25);color:var(--red);}
    .invalid-btn.restore{background:rgba(0,229,170,.08);border-color:rgba(0,229,170,.25);color:var(--teal);}
  </style>
  <link rel="stylesheet" href="css/borders.css">
</head>
<body>
<header class="top-bar">
  <span class="title">🔐 관리자</span>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="index.html" class="btn btn-ghost btn-sm">메인</a>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="page" id="app">
  <div class="loading"><div class="spinner"></div> 인증 확인 중...</div>
</div>
<div class="page" id="dataroomPage" style="display:none"></div>
<div class="toast" id="toast"></div>

<div class="modal-bg" id="delModal">
  <div class="modal">
    <h3>⚠️ 사용자 삭제</h3>
    <p style="font-size:14px;color:var(--muted);margin:10px 0 16px"><b id="delName"></b>의 모든 데이터가 삭제됩니다.</p>
    <div class="flex-row gap-8">
      <button class="btn btn-ghost btn-full" onclick="document.getElementById('delModal').classList.remove('open')">취소</button>
      <button class="btn btn-danger btn-full" id="delConfirmBtn">삭제</button>
    </div>
  </div>
</div>

<script type="module">
import { onAuthChange, adminSignOut, ADMIN_UID,
         getUsers, getUser, updateUser, deleteUser,
         getWeights, setWeight, deleteWeight, setDietExercise,
         getSettings, updateSettings,
         setUserPassword, parseWeight, DEFAULT_SETTINGS,
         getEarnedAchievements, invalidateAchievement,
         getTierSettings, saveTierSettings } from './js/db.js';
import { ACHIEVEMENTS, ACHIEVEMENT_CATEGORIES, DEFAULT_TIERS, getTierForScore } from './js/achievements.js';

let allUsers=[], selectedUid=null, settings={};

onAuthChange(async user => {
  if (!user || user.uid !== ADMIN_UID) { location.href='admin-login.html'; return; }
  await init();
});
window.doLogout = async () => { await adminSignOut(); location.href='admin-login.html'; };

let tierSettings = null;

async function init() {
  [allUsers, settings, tierSettings] = await Promise.all([getUsers(), getSettings(), getTierSettings()]);
  if (!tierSettings) tierSettings = { tiers: DEFAULT_TIERS };
  renderTabBar();
  renderApp();
}

function renderTabBar() {
  const tabBar = document.createElement('div');
  tabBar.className = 'admin-tabs';
  tabBar.id = 'adminTabBar';
  tabBar.innerHTML = `
    <button class="admin-tab active" onclick="switchTab('users')">👥 사용자 관리</button>
    <button class="admin-tab" onclick="switchTab('dataroom')">🗃️ 데이터실</button>`;
  document.getElementById('app').before(tabBar);
}

window.switchTab = tab => {
  document.querySelectorAll('.admin-tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='users')||(i===1&&tab==='dataroom')));
  document.getElementById('app').style.display = tab === 'users' ? '' : 'none';
  document.getElementById('dataroomPage').style.display = tab === 'dataroom' ? '' : 'none';
  if (tab === 'dataroom') renderDataroom();
};

function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="admin-grid">
      <div>
        <div class="card">
          <div class="section-title">👥 사용자</div>
          <div id="userList"></div>
        </div>
        <div class="card mt-12">
          <div class="section-title">⚙️ 기능 설정</div>
          <div id="featurePanel"></div>
        </div>
      </div>
      <div id="userDetail">
        <div class="card" style="padding:40px;text-align:center;color:var(--muted)">왼쪽에서 사용자를 선택하세요</div>
      </div>
    </div>`;
  renderUserList();
  renderFeaturePanel();
}

function renderUserList() {
  const el = document.getElementById('userList');
  if (!allUsers.length) { el.innerHTML='<p class="text-muted" style="padding:10px 0;font-size:13px">사용자 없음</p>'; return; }
  el.innerHTML = allUsers.map(u => `
    <div class="user-list-item ${u.id===selectedUid?'active':''}" onclick="selectUser('${u.id}')">
      <div class="av">${u.emoji||'⚖️'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px">${u.name}</div>
        <div style="font-size:11px;color:var(--muted)">${[u.goal?`목표 ${u.goal}kg`:'',u.height?`${u.height}cm`:'',u.birthYear?`${u.birthYear}년생`:''].filter(Boolean).join(' · ')}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();confirmDelete('${u.id}','${u.name}')">✕</button>
    </div>`).join('');
}

// ── 기능 토글 ─────────────────────────────────────────────────────────
const FEATURE_GROUPS = [
  { title:'📈 그래프', items:[
    {key:'show7dayMA',label:'7일 이동평균',desc:''},
    {key:'showWeeklyBar',label:'주간 막대',desc:''},
    {key:'showPrediction',label:'예상 그래프',desc:'기본 미체크'},
  ]},
  { title:'💬 말풍선', items:[
    {key:'showMaxMarker',label:'최고 체중',desc:''},
    {key:'showMinMarker',label:'최저 체중',desc:''},
    {key:'showCurMarker',label:'현재 체중',desc:''},
  ]},
  { title:'📋 스탯 카드', items:[
    {key:'showStatPeriod',label:'기간',desc:''},{key:'showStatStart',label:'시작 체중',desc:''},
    {key:'showStatCurrent',label:'현재 체중',desc:''},{key:'showStatLoss',label:'총 감량',desc:''},
    {key:'showStatRatio',label:'감량 비율',desc:''},{key:'showStatDaily',label:'일 평균',desc:''},
    {key:'showStatWeekly',label:'주 평균',desc:''},{key:'showStatGoal',label:'목표까지',desc:''},
    {key:'showStatETA',label:'달성 예상일',desc:''},{key:'showStatBMI',label:'BMI',desc:'키 필요'},
    {key:'showStatStreak',label:'연속 감량',desc:'주 단위'},
  ]},
];
function isOn(key) {
  if (key==='showPrediction') return !!settings[key];
  return settings[key]!==false;
}
function renderFeaturePanel() {
  let html='';
  FEATURE_GROUPS.forEach(g=>{
    html+=`<div class="toggle-section-title">${g.title}</div>`;
    g.items.forEach(f=>{
      html+=`<div class="toggle-row">
        <div><div style="font-size:13px">${f.label}</div>${f.desc?`<div style="font-size:11px;color:var(--muted)">${f.desc}</div>`:''}</div>
        <label class="switch"><input type="checkbox" ${isOn(f.key)?'checked':''}
          onchange="onToggle('${f.key}',this.checked)"><span class="slider"></span></label>
      </div>`;
    });
  });
  const opVal=Math.round((settings.annotOpacity??0.88)*100);
  html+=`<div class="toggle-section-title">🎨 말풍선 투명도</div>
    <div class="range-row">
      <input type="range" id="opR" min="0" max="100" value="${opVal}" oninput="onOp(this.value)">
      <span id="opV" style="font-size:13px;width:36px;text-align:right">${opVal}%</span>
    </div>`;
  document.getElementById('featurePanel').innerHTML=html;
}
window.onToggle=async(key,val)=>{settings[key]=val;await updateSettings({[key]:val});showToast('저장됨','ok');};
window.onOp=async val=>{document.getElementById('opV').textContent=val+'%';await updateSettings({annotOpacity:val/100});};

// ── 사용자 상세 ───────────────────────────────────────────────────────
window.selectUser = async uid => {
  selectedUid=uid; renderUserList();
  document.getElementById('userDetail').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const [user,records,earned]=await Promise.all([getUser(uid),getWeights(uid),getEarnedAchievements(uid)]);
  renderDetail(user,records,earned);
};

function fmtTs(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

let _detailRecords = [];

function renderDetail(user, records, earned=[]) {
  _detailRecords = records;
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('userDetail').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        <div>
          <div style="font-size:17px;font-weight:800">${user.emoji||'⚖️'} ${user.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            ${[user.height?`${user.height}cm`:'',user.birthYear?`${user.birthYear}년생`:'',`목표 ${user.goal||80}kg`].filter(Boolean).join(' · ')}
            ${user.selectedTitle?`· 🏷️ ${user.selectedTitle}`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="window.open('dashboard.html?user=${user.id}&admin_view=1','_blank')">📊 그래프 보기</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditUser('${user.id}')">✏️ 수정</button>
          <button class="btn btn-ghost btn-sm" onclick="openPwEdit('${user.id}','${user.name}')">🔑 비번</button>
        </div>
      </div>
      <div class="section-title">${records.length}개 기록</div>
      <div style="max-height:400px;overflow-y:auto;margin-top:6px">
        <table class="rec-table">
          <thead><tr>
            <th>날짜</th>
            <th>체중</th>
            <th style="width:20px"></th>
            <th>식단 (아·점·저)</th>
            <th>운동</th>
            <th></th>
          </tr></thead>
          <tbody id="recBody">${sorted.map(r=>recRow(user.id,r)).join('')}</tbody>
        </table>
      </div>
    </div>

    <!-- 업적 -->
    <div class="card mt-12">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="section-title" style="margin:0">🏆 업적 현황 (${earned.filter(a=>!a.invalidated).length}/${ACHIEVEMENTS.length})</div>
        <span style="font-size:12px;color:var(--teal)">${earned.filter(a=>!a.invalidated).reduce((s,a)=>{const ac=ACHIEVEMENTS.find(x=>x.id===a.id);return s+(ac?.score||0);},0)}점</span>
      </div>
      ${earned.length ? `
        <div class="ach-admin-list">
          ${earned.sort((a,b)=>{const ta=a.earnedAt?.toDate?a.earnedAt.toDate():new Date(0);const tb=b.earnedAt?.toDate?b.earnedAt.toDate():new Date(0);return tb-ta;}).map(a=>{
            const ac=ACHIEVEMENTS.find(x=>x.id===a.id);
            if(!ac)return '';
            return `<div class="ach-admin-row ${a.invalidated?'invalidated':''}" id="arow-${user.id}-${a.id}">
              <div class="ar-icon">${ac.icon}</div>
              <div class="ar-info">
                <div style="font-weight:700">${ac.name} <span style="color:var(--teal);font-size:10px">+${ac.score}점</span>${a.invalidated?'<span style="color:var(--red);font-size:10px;margin-left:4px">무효</span>':''}</div>
                <div class="ar-date">${fmtTs(a.earnedAt)}</div>
              </div>
              <button class="invalid-btn ${a.invalidated?'restore':''}" onclick="toggleInvalid('${user.id}','${a.id}',${!a.invalidated})">
                ${a.invalidated?'복원':'무효화'}
              </button>
            </div>`;
          }).join('')}
        </div>
      ` : '<p style="font-size:12px;color:var(--muted);padding:8px 0">달성한 업적이 없어요</p>'}
    </div>`;
}

function mealTlHtml(uid, date, mealTime, currentColor) {
  const cols = ['green','yellow','red'];
  const bg = { green:'rgba(102,187,106,', yellow:'rgba(255,167,38,', red:'rgba(239,83,80,' };
  const btns = cols.map(c =>
    `<button onclick="adminSetMeal('${uid}','${date}','${mealTime}','${c}')"
      title="${{green:'좋음',yellow:'보통',red:'나쁨'}[c]}"
      style="width:13px;height:13px;border-radius:2px;border:none;cursor:pointer;
             background:${bg[c]}${currentColor===c?'.9':'.18'});
             outline:${currentColor===c?`2px solid ${bg[c]}.9)`:'none'};
             outline-offset:1px"></button>`
  ).join('');
  const reset = `<button onclick="adminSetMeal('${uid}','${date}','${mealTime}',null)"
    title="미선택"
    style="font-size:9px;padding:0 3px;line-height:13px;height:13px;background:none;
           border:1px solid rgba(255,255,255,.2);border-radius:2px;color:var(--muted);cursor:pointer">✕</button>`;
  return `<div style="display:flex;gap:2px;align-items:center">${btns}${reset}</div>`;
}

function exBtnsHtml(uid, date, exercise) {
  const yesStyle = `background:rgba(102,187,106,${exercise===true?'.25':'.07'});border:1px solid rgba(102,187,106,${exercise===true?'.7':'.25'});color:${exercise===true?'#66bb6a':'var(--muted)'}`;
  const noStyle  = `background:rgba(239,83,80,${exercise===false?'.25':'.07'});border:1px solid rgba(239,83,80,${exercise===false?'.7':'.25'});color:${exercise===false?'#ef5350':'var(--muted)'}`;
  const offStyle = `background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:var(--muted)`;
  return `<div style="display:flex;gap:3px">
    <button onclick="adminSetEx('${uid}','${date}',true)"  style="font-size:11px;padding:1px 5px;border-radius:4px;cursor:pointer;${yesStyle}">✓</button>
    <button onclick="adminSetEx('${uid}','${date}',false)" style="font-size:11px;padding:1px 5px;border-radius:4px;cursor:pointer;${noStyle}">✗</button>
    <button onclick="adminSetEx('${uid}','${date}',null)"  style="font-size:11px;padding:1px 5px;border-radius:4px;cursor:pointer;${offStyle}">-</button>
  </div>`;
}

function recRow(uid, r) {
  const meal = r.meal || {};
  return `<tr id="row-${r.date}">
    <td style="color:var(--muted);font-size:12px;white-space:nowrap">${r.date}</td>
    <td>
      <div style="display:flex;align-items:center;gap:4px">
        <input class="w-edit" type="number" step="0.1"
          value="${r.weight!=null?r.weight.toFixed(1):''}"
          onblur="saveW('${uid}','${r.date}',this)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <span style="font-size:11px;color:var(--muted)">kg</span>
      </div>
    </td>
    <td id="saved-${r.date}" style="width:18px"></td>
    <td>
      <div style="display:flex;flex-direction:column;gap:2px">
        ${['morning','lunch','dinner'].map(m => mealTlHtml(uid, r.date, m, meal[m]||null)).join('')}
      </div>
    </td>
    <td>${exBtnsHtml(uid, r.date, r.exercise)}</td>
    <td><button class="del-btn" onclick="removeW('${uid}','${r.date}')">🗑</button></td>
  </tr>`;
}

window.saveW = async (uid, date, input) => {
  const w = parseWeight(input.value); if (w===null) return;
  input.value = w.toFixed(1); await setWeight(uid, date, w);
  const s = document.getElementById(`saved-${date}`);
  if (s) s.innerHTML = '<span class="saved-flash">✓</span>';
};
window.removeW = async (uid, date) => {
  await deleteWeight(uid, date);
  document.getElementById(`row-${date}`)?.remove();
  _detailRecords = _detailRecords.filter(r => r.date !== date);
  showToast('삭제됨','ok');
};
window.adminSetMeal = async (uid, date, mealTime, value) => {
  const rec = _detailRecords.find(r => r.date === date) || { date };
  const newMeal = { ...(rec.meal||{}), [mealTime]: value };
  if (value === null) delete newMeal[mealTime];
  rec.meal = newMeal;
  if (!_detailRecords.find(r => r.date === date)) _detailRecords.push(rec);
  await setDietExercise(uid, date, { meal: newMeal });
  // 해당 행만 재렌더
  const row = document.getElementById(`row-${date}`);
  if (row) row.outerHTML = recRow(uid, rec);
};
window.adminSetEx = async (uid, date, value) => {
  const rec = _detailRecords.find(r => r.date === date) || { date };
  rec.exercise = value;
  if (!_detailRecords.find(r => r.date === date)) _detailRecords.push(rec);

};

};

function buildAchRewardContent() {
  let html = `<p style="font-size:12px;color:var(--muted);margin-bottom:12px">각 업적에 테두리·칭호 보상을 배정하세요. 달성 시 자동 잠금해제됩니다.</p>`;
  ACHIEVEMENT_CATEGORIES.forEach(cat => {
    const catAchs = ACHIEVEMENTS.filter(a => a.cat === cat.id);
    if (!catAchs.length) return;
    html += `<div style="font-size:11px;font-weight:700;color:var(--muted);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.04em">${cat.icon} ${cat.label}</div>`;
    catAchs.forEach(a => {
      const curBorder = Object.entries(borderAssign).find(([,aId]) => aId === a.id)?.[0] || '';
      const curTitle  = titleList.find(t => t.achId === a.id)?.id || '';
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <span style="font-size:16px;flex-shrink:0">${a.icon}</span>
        <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}${a.legendary?' <span style="font-size:9px;color:#FFD700;font-weight:700">(위업)</span>':''}</span>
        <select class="input-field" style="padding:3px 5px;font-size:10px;width:130px;flex-shrink:0"
          data-ach-border="${a.id}" onchange="saveAchBorder(this)">
          <option value="">테두리 없음</option>
          ${BORDER_LIST.map(b=>`<option value="${b.id}" ${curBorder===b.id?'selected':''}>${b.name}</option>`).join('')}
        </select>
        <select class="input-field" style="padding:3px 5px;font-size:10px;width:110px;flex-shrink:0"
          data-ach-title="${a.id}" onchange="saveAchTitle(this)">
          <option value="">칭호 없음</option>
          ${titleList.map(t=>`<option value="${t.id}" ${curTitle===t.id?'selected':''}>${t.name}</option>`).join('')}
        </select>
      </div>`;
    });
  });
  return html;
}

window.saveAchBorder = async sel => {
  const achId = sel.dataset.achBorder, newBorderId = sel.value;
  Object.keys(borderAssign).forEach(bId => { if (borderAssign[bId] === achId) delete borderAssign[bId]; });
  if (newBorderId) borderAssign[newBorderId] = achId;
  await saveDrSettings(); showToast('테두리 보상 저장됨','ok');
};
window.saveAchTitle = async sel => {
  const achId = sel.dataset.achTitle, newTitleId = sel.value;
  titleList.forEach(t => { if (t.achId === achId) t.achId = null; });
  if (newTitleId) { const t = titleList.find(x => x.id === newTitleId); if (t) t.achId = achId; }
  await saveDrSettings(); showToast('칭호 보상 저장됨','ok');
};

window.saveTiers = async () => {
  const tiers = (tierSettings?.tiers || DEFAULT_TIERS).map(t => {
    const nameEl  = document.querySelector(`input[data-tier="${t.id}"][data-field="name"]`);
    const scoreEl = document.querySelector(`input[data-tier="${t.id}"][data-field="minScore"]`);
    const colorEl = document.querySelector(`input[data-tier="${t.id}"][data-field="color"]`);
    return { ...t,
      name:     nameEl  ? nameEl.value.trim()       : t.name,
      minScore: scoreEl ? parseInt(scoreEl.value)||0 : t.minScore,
      color:    colorEl ? colorEl.value              : t.color,
    };
  });
  await saveTierSettings({ tiers });
  tierSettings = { ...tierSettings, tiers };
  showToast('티어 설정 저장됨 ✓', 'ok');
};

// delModal 바깥 클릭 닫기
document.getElementById('delModal').addEventListener('click', e=>{
  if(e.target===document.getElementById('delModal'))
    document.getElementById('delModal').classList.remove('open');
});

function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.className='toast',2000);
}
</script>
